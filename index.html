<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>SpareTrack — QR Stock Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Noto Sans Thai',sans-serif;background:#f4f5f7;color:#111827;overflow-x:hidden}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.anim-fade{animation:fadeIn .25s ease}
.sync-pulse{animation:pulse 2s infinite}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199;display:none}
@media(max-width:768px){
  .sidebar-overlay.open{display:block}
  .desktop-sidebar{transform:translateX(-100%);transition:transform .25s ease}
  .desktop-sidebar.open{transform:translateX(0);animation:slideIn .25s ease}
  .main-content{margin-left:0!important}
  .mob-header{display:flex!important}
}
@media print{
  body>div>*:not(.print-root){display:none!important}
  .print-root .no-print{display:none!important}
  .qr-card{break-inside:avoid;page-break-inside:avoid}
  @page{size:A4;margin:8mm}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const{useState,useEffect,useRef}=React;

// ★★★ ใส่ URL Google Apps Script ที่นี่ ★★★
const GAS_URL="https://script.google.com/macros/s/AKfycbwUchm0HLZGHbDH8rLbbp7qu9lp5WUL05mJEBD-XR1VL-1FEnkd5C7v6bLb0wFCB20/exec";
const MANUAL_APP_URL="";
const _autoUrl=window.location.href.split("?")[0].split("#")[0];
const IS_FILE=_autoUrl.startsWith("file:");
const APP_URL=(MANUAL_APP_URL||(IS_FILE?"":_autoUrl));

// ─── Google Sheet API ──────────────────────────────────────
const GSheet={
  ok(){return GAS_URL&&GAS_URL.length>10;},
  async _post(action,data){
    if(!this.ok())return{ok:false};
    try{const r=await fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action,data})});return await r.json();}catch(e){return{ok:false,error:String(e)};}},
  async _get(action){
    if(!this.ok())return{ok:false};
    try{const r=await fetch(GAS_URL+"?action="+encodeURIComponent(action),{method:"GET"});return await r.json();}catch(e){return{ok:false,error:String(e)};}},
  getAll(){return this._get("getAll");},
  syncParts(d){return this._post("syncParts",d);},
  syncMGs(d){return this._post("syncMGs",d);},
  syncPending(d){return this._post("syncPending",d);},
  addPending(d){return this._post("addPending",d);},
  addPart(d){return this._post("addPart",d);},
  addTx(d){return this._post("addTx",d);},
  deletePending(id){return this._post("deletePending",{id});},
  clearPending(){return this._post("clearPending");},
  deletePart(id){return this._post("deletePart",{id});},
};

// ─── Constants ─────────────────────────────────────────────
const KEYS={parts:"spt_parts",tx:"spt_tx",mg:"spt_mg",pending:"spt_pending",users:"spt_users",session:"spt_scan_session"};
const SESSION_TTL=24*60*60*1000;
const DEFAULT_MG=[
  {id:"mg1",name:"Robot ABB",icon:"🤖",color:"#f59e0b"},
  {id:"mg2",name:"Robot Yaskawa",icon:"🦾",color:"#10b981"},
  {id:"mg3",name:"Trulaser Cell",icon:"⚡",color:"#3b82f6"},
  {id:"mg4",name:"Fronius",icon:"🔥",color:"#ef4444"},
  {id:"mg5",name:"Hydroforming",icon:"💧",color:"#8b5cf6"},
  {id:"mg6",name:"Bending",icon:"⚙️",color:"#f97316"},
  {id:"mg7",name:"Press",icon:"🔩",color:"#ec4899"},
];
const PART_CATS=["Bearing","Belt","Seal","Gear","Filter","Pump","Valve","Motor","Sensor","Electrical","Hydraulic","Pneumatic","Other"];
const ICON_OPTS=["🤖","🦾","⚡","🔥","💧","⚙️","🔩","🏭","🛠️","⚒️","🔧","🔨","🪛","💡","🧲"];
const COLOR_OPTS=["#f59e0b","#10b981","#3b82f6","#ef4444","#8b5cf6","#f97316","#ec4899","#06b6d4","#84cc16","#6b7280"];
const DEFAULT_USERS=[
  {id:"u1",username:"MTN",name:"Maintenance",role:"User",dept:"Maintenance",password:"1234"},
  {id:"u2",username:"2102278",name:"เจ้าสัว",role:"User",dept:"Maintenance",password:"1234"},
  {id:"u3",username:"2101740",name:"กีรติวุฒิ",role:"User",dept:"Supervisor",password:"1234"},
  {id:"u4",username:"2101728",name:"ณัฐภัทร",role:"User",dept:"Maintenance",password:"1234"},
  {id:"u5",username:"2102353",name:"พิชัย",role:"User",dept:"Maintenance",password:"1234"},
  {id:"u6",username:"2102396",name:"สมหวัง",role:"User",dept:"Maintenance",password:"1234"},
  {id:"u7",username:"2103340",name:"เจนณรงค์",role:"User",dept:"Maintenance",password:"1234"},
  {id:"u8",username:"2101637",name:"อำพรรณ์",role:"User",dept:"Manager",password:"1234"},
  {id:"u9",username:"admin",name:"admin",role:"approver",dept:"Management",password:"admin"},
  {id:"u10",username:"2101887",name:"พี่บ่าววี",role:"User",dept:"Maintenance",password:"1234"},
];
const INIT_PARTS=[{id:"p1",partCode:"ABB-BRG-6205",name:"Bearing 6205",desc:"Deep groove ball bearing",unit:"ชิ้น",stock:45,min:10,max:100,loc:"A-01",cat:"Bearing",mgId:"mg1",createdAt:new Date().toISOString()}];

// ─── Storage ───────────────────────────────────────────────
const load=(k,fb)=>{try{return JSON.parse(localStorage.getItem(k))||fb;}catch{return fb;}};
const store=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const uid=()=>Math.random().toString(36).slice(2,10);
function initDB(){
  if(!localStorage.getItem(KEYS.parts))store(KEYS.parts,INIT_PARTS);
  if(!localStorage.getItem(KEYS.tx))store(KEYS.tx,[]);
  if(!localStorage.getItem(KEYS.mg))store(KEYS.mg,DEFAULT_MG);
  if(!localStorage.getItem(KEYS.pending))store(KEYS.pending,[]);
  store(KEYS.users,DEFAULT_USERS);
}
const getParts=()=>load(KEYS.parts,INIT_PARTS);
const getTx=()=>load(KEYS.tx,[]);
const getMGs=()=>load(KEYS.mg,DEFAULT_MG);
const getPending=()=>load(KEYS.pending,[]);
const getUsers=()=>load(KEYS.users,DEFAULT_USERS);

// ─── Cloud sync ────────────────────────────────────────────
async function pullFromCloud(){
  if(!GSheet.ok())return{ok:false};
  const r=await GSheet.getAll();
  if(!r||!r.ok||!r.data)return{ok:false,error:r?.error||"fail"};
  const d=r.data;
  const numF=["stock","min","max","qty","stockBefore","stockAfter"];
  const fix=rows=>(rows||[]).map(row=>{const o={...row};numF.forEach(k=>{if(o[k]!==undefined&&o[k]!==""&&o[k]!==null)o[k]=Number(o[k])||0;});return o;});
  if(d.parts&&d.parts.length>0)store(KEYS.parts,fix(d.parts));
  if(d.mgs&&d.mgs.length>0)store(KEYS.mg,d.mgs);
  store(KEYS.pending,fix(d.pending||[]));
  store(KEYS.tx,fix(d.tx||[]));
  return{ok:true};
}
async function pushAllToCloud(){
  if(!GSheet.ok())return;
  await GSheet.syncMGs(getMGs());await GSheet.syncParts(getParts());await GSheet.syncPending(getPending());
}

// ─── Session ───────────────────────────────────────────────
function getCachedSession(){try{const r=localStorage.getItem(KEYS.session);if(!r)return null;const o=JSON.parse(r);if(!o||!o.user||!o.timestamp)return null;if(Date.now()-o.timestamp>SESSION_TTL){localStorage.removeItem(KEYS.session);return null;}return o;}catch{return null;}}
function setCachedSession(u){localStorage.setItem(KEYS.session,JSON.stringify({user:u,timestamp:Date.now()}));}
function clearCachedSession(){localStorage.removeItem(KEYS.session);}
function getRemainingMs(){const s=getCachedSession();if(!s)return 0;return Math.max(0,SESSION_TTL-(Date.now()-s.timestamp));}
function formatRemaining(ms){if(ms<=0)return"หมดอายุ";const m=Math.floor(ms/60000);const h=Math.floor(m/60);return h>0?(h+"ชม."+(m%60)+"น."):(m+"นาที");}
function validateEmployeeId(id){const t=(id||"").trim();if(!t)return{ok:false,err:"กรุณาใส่รหัสพนักงาน"};const u=getUsers().find(x=>x.username===t||x.username.toLowerCase()===t.toLowerCase());if(!u)return{ok:false,err:"ไม่พบรหัสนี้ในระบบ"};return{ok:true,user:u};}

// ─── Helpers ───────────────────────────────────────────────
function stockStatus(p){if(p.stock<=p.min)return"critical";if(p.stock<=p.min*1.5)return"low";if(p.stock>=p.max)return"over";return"ok";}
const statusCfg={critical:{label:"Critical",bg:"#fef2f2",color:"#dc2626",border:"#fca5a5"},low:{label:"Low",bg:"#fffbeb",color:"#d97706",border:"#fcd34d"},over:{label:"Over",bg:"#eff6ff",color:"#2563eb",border:"#93c5fd"},ok:{label:"Normal",bg:"#f0fdf4",color:"#16a34a",border:"#86efac"}};
function sBadge(st){const c=statusCfg[st]||statusCfg.ok;return{display:"inline-block",padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:600,background:c.bg,color:c.color,border:"1px solid "+c.border};}
function QR({value,size}){size=size||140;const url="https://api.qrserver.com/v1/create-qr-code/?size="+size+"x"+size+"&data="+encodeURIComponent(value);return<div style={{display:"inline-block",background:"#fff",borderRadius:8,padding:6,border:"1px solid "+C.border}}><img src={url} alt="QR" width={size} height={size} style={{display:"block"}}/></div>;}
function makeQRUrl(pc){if(!APP_URL)return pc;return APP_URL+"?scan="+encodeURIComponent(pc);}

// ─── Mobile detect ─────────────────────────────────────────
function useIsMobile(){const[m,setM]=useState(window.innerWidth<769);useEffect(()=>{const h=()=>setM(window.innerWidth<769);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);return m;}

// ─── Styles ────────────────────────────────────────────────
const C={bg:"#f4f5f7",border:"#e2e4e9",text:"#111827",sub:"#6b7280",muted:"#9ca3af",primary:"#1d4ed8",primaryL:"#eff6ff",sidebar:"#0f172a",sidebarAct:"#1e3a5f"};
const btn=(v,ex)=>{v=v||"primary";ex=ex||{};const b={padding:"8px 16px",borderRadius:6,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,display:"inline-flex",alignItems:"center",gap:6};const vs={primary:{background:C.primary,color:"#fff"},danger:{background:"#dc2626",color:"#fff"},success:{background:"#16a34a",color:"#fff"},outline:{background:"#fff",color:C.text,border:"1px solid "+C.border},ghost:{background:"transparent",color:C.sub},default:{background:"#f3f4f6",color:C.text}};return{...b,...(vs[v]||vs.default),...ex};};
const inp=(ex)=>({width:"100%",padding:"9px 12px",borderRadius:6,border:"1px solid "+C.border,fontSize:13,outline:"none",background:"#fff",boxSizing:"border-box",color:C.text,...(ex||{})});
const card=(ex)=>({background:"#fff",borderRadius:10,border:"1px solid "+C.border,...(ex||{})});
const MOD={position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:12};
const MODB=(w)=>({background:"#fff",borderRadius:14,padding:24,width:"100%",maxWidth:w||520,maxHeight:"92vh",overflowY:"auto"});
const TH={padding:"8px 12px",textAlign:"left",borderBottom:"2px solid "+C.border,color:C.sub,fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:".04em"};
const TD={padding:"9px 12px",borderBottom:"1px solid "+C.bg,verticalAlign:"middle",fontSize:12};
const lbl=()=>({fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:5});

// ═══════════════════════════════════════════════════════════
//  APP
// ═══════════════════════════════════════════════════════════
function App(){
  const mob=useIsMobile();
  const[sideOpen,setSideOpen]=useState(false);
  const[page,setPage]=useState("dashboard");
  const[parts,setParts]=useState([]);
  const[txs,setTxs]=useState([]);
  const[mgs,setMgs]=useState([]);
  const[pending,setPending]=useState([]);
  const[session,setSession]=useState(null);
  const[notif,setNotif]=useState(null);
  const[selMG,setSelMG]=useState(null);
  const[selCat,setSelCat]=useState("all");
  const[search,setSearch]=useState("");
  const[qrM,setQrM]=useState(null);
  const[addM,setAddM]=useState(false);
  const[stkM,setStkM]=useState(null);
  const[loginM,setLoginM]=useState(false);
  const[scanPopup,setScanPopup]=useState(null);
  const[scanUnknown,setScanUnknown]=useState(null);
  const[syncing,setSyncing]=useState(false);
  const[tick,setTick]=useState(0);
  // ★ Scan Landing — เด้งเต็มจอทันทีเมื่อสแกน QR ★
  const[scanLanding,setScanLanding]=useState(null); // {code, part, loading, error}

  function refresh(){setParts(getParts());setTxs(getTx());setMgs(getMGs());setPending(getPending());}
  function notify(msg,type){setNotif({msg,type:type||"ok"});setTimeout(()=>setNotif(null),3500);}
  function goPage(p){setPage(p);setSideOpen(false);}
  function establishSession(u){setSession(u);setCachedSession(u);}
  function logoutSession(){setSession(null);clearCachedSession();notify("ออกจากระบบแล้ว","warn");}

  useEffect(()=>{
    initDB();refresh();
    const cached=getCachedSession();
    if(cached&&cached.user)setSession(cached.user);

    // ★★★ SCAN QR LANDING — เด้งเต็มจอทันทีเมื่อ ?scan= อยู่ใน URL ★★★
    const params=new URLSearchParams(window.location.search);
    const scanCode=params.get("scan");
    if(scanCode){
      window.history.replaceState({},"",window.location.href.split("?")[0]);
      // เด้ง Landing Page ทันที (ไม่ต้องรอ)
      setScanLanding({code:scanCode, part:null, loading:true, error:null});
      // ค้นหา Part: localStorage ก่อน → Cloud
      (async()=>{
        const findPart=()=>{const all=getParts();const cl=scanCode.toLowerCase();
          return all.find(x=>x.partCode===scanCode||x.id===scanCode||(x.partCode&&x.partCode.toLowerCase()===cl));};
        let p=findPart();
        if(p){setScanLanding({code:scanCode,part:p,loading:false,error:null});return;}
        // ไม่เจอในเครื่อง → ดึงจาก Cloud
        if(GSheet.ok()){
          try{
            const r=await pullFromCloud();
            if(r.ok){refresh();p=findPart();
              if(p){setScanLanding({code:scanCode,part:p,loading:false,error:null});return;}}
          }catch(e){}
        }
        // ยังไม่เจอ → แสดง Quick Mode (ใส่ Part Code จาก QR ตรงๆ)
        setScanLanding({code:scanCode,part:null,loading:false,error:null});
      })();
    }

    // background sync
    (async()=>{if(GSheet.ok()){setSyncing(true);const r=await pullFromCloud();setSyncing(false);if(r.ok){refresh();if(getParts().length<=1)await pushAllToCloud();}else notify("ดึง Cloud ล้มเหลว","warn");}})();
    const onFocus=async()=>{if(!GSheet.ok())return;const r=await pullFromCloud();if(r.ok)refresh();};
    window.addEventListener("focus",onFocus);
    const poll=setInterval(async()=>{if(document.visibilityState!=="visible"||!GSheet.ok())return;const r=await pullFromCloud();if(r.ok)refresh();},30000);
    const itv=setInterval(()=>setTick(t=>t+1),60000);
    return()=>{clearInterval(itv);clearInterval(poll);window.removeEventListener("focus",onFocus);};
  },[]);

  const mgMap=Object.fromEntries(mgs.map(m=>[m.id,m]));
  const alerts=parts.filter(p=>["critical","low"].includes(stockStatus(p)));

  async function syncToSheets(){if(!GSheet.ok()){notify("ตั้งค่า GAS_URL ก่อน","warn");return;}setSyncing(true);const r=await pullFromCloud();setSyncing(false);if(r.ok){refresh();notify("Sync สำเร็จ");}else notify("Sync ล้มเหลว","warn");}
  async function pushAllNow(){if(!GSheet.ok())return;setSyncing(true);await pushAllToCloud();setSyncing(false);notify("Push สำเร็จ");}
  async function addPending(partId,qty,note,req){
    const ps=getParts(),p=ps.find(x=>x.id===partId);if(!p)return;
    const row={id:uid(),partId,partCode:p.partCode,partName:p.name,mgId:p.mgId,unit:p.unit,qty,note,requesterId:req?.id,requesterName:req?.name,requesterUsername:req?.username,createdAt:new Date().toISOString()};
    const rows=getPending();rows.push(row);store(KEYS.pending,rows);refresh();
    notify("ส่งคำขอเบิก "+p.name+" x"+qty);
    if(GSheet.ok())await GSheet.addPending(row);
  }
  async function addPendingByCode(partCode,qty,note,req){
    const row={id:uid(),partId:"unknown",partCode,partName:partCode,mgId:"-",unit:"ชิ้น",qty,note,requesterId:req?.id,requesterName:req?.name,requesterUsername:req?.username,createdAt:new Date().toISOString()};
    const rows=getPending();rows.push(row);store(KEYS.pending,rows);refresh();
    notify("ส่งคำขอเบิก "+partCode+" x"+qty);
    if(GSheet.ok())await GSheet.addPending(row);
  }
  async function approveAll(){
    const rows=getPending(),map={};rows.forEach(r=>{map[r.partId]=(map[r.partId]||0)+r.qty;});
    const ps=getParts(),txNew=getTx(),newTxs=[];
    Object.entries(map).forEach(([pid,qty])=>{const i=ps.findIndex(p=>p.id===pid);if(i===-1)return;const b=ps[i].stock;ps[i].stock=Math.max(0,b-qty);
      const tx={id:uid(),partId:pid,partCode:ps[i].partCode,partName:ps[i].name,mgId:ps[i].mgId,unit:ps[i].unit,type:"withdraw",qty,stockBefore:b,stockAfter:ps[i].stock,approvedBy:session?.name,note:"อนุมัติ",createdAt:new Date().toISOString()};
      txNew.unshift(tx);newTxs.push(tx);});
    store(KEYS.parts,ps);store(KEYS.tx,txNew);store(KEYS.pending,[]);refresh();notify("อนุมัติ "+Object.keys(map).length+" รายการ");
    if(GSheet.ok()){await GSheet.clearPending();for(const tx of newTxs)await GSheet.addTx(tx);await GSheet.syncParts(getParts());}
  }
  async function deletePending(id){store(KEYS.pending,getPending().filter(r=>r.id!==id));refresh();notify("ลบแล้ว","warn");if(GSheet.ok())await GSheet.deletePending(id);}
  async function doReceive(partId,qty,note){
    const ps=getParts(),i=ps.findIndex(p=>p.id===partId);if(i===-1)return;const b=ps[i].stock;ps[i].stock=b+qty;store(KEYS.parts,ps);
    const tx={id:uid(),partId,partCode:ps[i].partCode,partName:ps[i].name,mgId:ps[i].mgId,unit:ps[i].unit,type:"receive",qty,stockBefore:b,stockAfter:ps[i].stock,approvedBy:session?.name,note,createdAt:new Date().toISOString()};
    getTx().unshift(tx);store(KEYS.tx,[tx,...getTx()]);refresh();notify("รับเข้า "+ps[i].name+" x"+qty);
    if(GSheet.ok()){await GSheet.addTx(tx);await GSheet.syncParts(getParts());}
  }
  async function doAddPart(data){
    const ps=getParts();const np={id:uid(),...data,stock:+data.stock,min:+data.min,max:+data.max,createdAt:new Date().toISOString()};
    ps.push(np);store(KEYS.parts,ps);refresh();notify("เพิ่ม "+data.name+" สำเร็จ");setAddM(false);
    if(GSheet.ok())await GSheet.addPart(np);
  }
  async function doDeletePart(id){store(KEYS.parts,getParts().filter(p=>p.id!==id));store(KEYS.pending,getPending().filter(r=>r.partId!==id));refresh();notify("ลบแล้ว","warn");if(GSheet.ok())await GSheet.deletePart(id);}
  function exportCSV(){
    const rows=[["วันที่","รหัส","ชื่อ","เครื่องจักร","ประเภท","จำนวน","ก่อน","หลัง","อนุมัติโดย"]];
    txs.forEach(t=>rows.push([new Date(t.createdAt).toLocaleString("th-TH"),t.partCode,t.partName,mgMap[t.mgId]?.name||"-",t.type==="withdraw"?"เบิก":"รับ",t.qty,t.stockBefore,t.stockAfter,t.approvedBy||"-"]));
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+rows.map(r=>r.join(",")).join("\n")],{type:"text/csv;charset=utf-8"}));a.download="spare_report.csv";a.click();
  }
  function handleScanQR(val){
    const v=val.trim();if(!v)return;let code=v;if(v.startsWith("SPAREPART:"))code=v.split(":")[2]||v.split(":")[1];
    const fp=getParts();const cl=code.toLowerCase(),vl=v.toLowerCase();
    const p=fp.find(x=>x.partCode===code||x.partCode===v||x.partCode.toLowerCase()===cl||x.partCode.toLowerCase()===vl||x.id===code||x.id===v);
    if(p){setScanPopup(p);refresh();}else setScanUnknown(code);
  }

  const mgParts=selMG?parts.filter(p=>p.mgId===selMG):parts;
  const catList=[...new Set(mgParts.map(p=>p.cat))].sort();
  const filtered=mgParts.filter(p=>{const q=search.toLowerCase();return(selCat==="all"||p.cat===selCat)&&(!q||p.name.toLowerCase().includes(q)||p.partCode.toLowerCase().includes(q));});
  const nav=[{id:"dashboard",label:"Dashboard",icon:"▦"},{id:"parts",label:"Spare Parts",icon:"⊞"},{id:"scan",label:"สแกน QR",icon:"📱"},{id:"approve",label:"ใบอนุมัติ",icon:"✔"},{id:"txs",label:"ประวัติ",icon:"≡"},{id:"settings",label:"ตั้งค่า",icon:"⚙"}];
  const rm=session?getRemainingMs():0;

  // ─── Sidebar content (shared mobile/desktop) ──────────
  const SidebarContent=()=><>
    <div style={{padding:"18px 16px 14px",borderBottom:"1px solid #1e293b"}}>
      <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9"}}>⚙ SpareTrack</div>
      <div style={{fontSize:10,color:"#64748b",marginTop:2}}>QR Stock Management</div>
      {GSheet.ok()&&<div className="sync-pulse" style={{marginTop:5,fontSize:9,color:"#4ade80",display:"flex",alignItems:"center",gap:4}}>
        <span style={{width:5,height:5,borderRadius:"50%",background:"#4ade80",display:"inline-block"}}/>Cloud Active</div>}
    </div>
    <div style={{flex:1,paddingTop:6}}>
      {nav.map(n=>{const act=page===n.id;const badge=n.id==="approve"?pending.length:n.id==="dashboard"?alerts.length:0;
        return<div key={n.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",cursor:"pointer",
          color:act?"#f1f5f9":"#94a3b8",background:act?C.sidebarAct:"transparent",
          borderLeft:act?"3px solid #3b82f6":"3px solid transparent",fontSize:13,fontWeight:act?600:400}}
          onClick={()=>goPage(n.id)}>
          <span style={{fontSize:14}}>{n.icon}</span><span style={{flex:1}}>{n.label}</span>
          {badge>0&&<span style={{background:"#dc2626",color:"#fff",borderRadius:10,fontSize:9,padding:"1px 5px",fontWeight:700}}>{badge}</span>}
        </div>;})}
    </div>
    {GSheet.ok()&&<div style={{padding:"6px 16px"}}>
      <button style={{...btn("outline",{width:"100%",justifyContent:"center",fontSize:10,padding:"6px 10px",color:"#94a3b8",borderColor:"#334155"})}}
        onClick={syncToSheets} disabled={syncing}>{syncing?"⏳ Syncing...":"🔄 Sync"}</button></div>}
    <div style={{padding:"12px 16px",borderTop:"1px solid #1e293b"}}>
      {session?<>
        <div style={{fontSize:10,color:"#64748b",marginBottom:3}}>{session.role.toLowerCase()==="approver"?"👔 ผู้อนุมัติ":"👷 ผู้เบิก"}</div>
        <div style={{fontSize:12,color:"#f1f5f9",fontWeight:600,marginBottom:1}}>{session.name}</div>
        <div style={{fontSize:10,color:"#64748b",marginBottom:6}}>{session.username}</div>
        <button style={{...btn("ghost"),color:"#64748b",padding:"4px 0",fontSize:11}} onClick={logoutSession}>ออกจากระบบ</button>
      </>:<>
        <button style={{...btn("outline"),width:"100%",justifyContent:"center",fontSize:11}} onClick={()=>setLoginM(true)}>🔑 เข้าสู่ระบบ</button>
      </>}
    </div>
  </>;

  return(
    <div style={{fontFamily:"'DM Sans','Noto Sans Thai',sans-serif",minHeight:"100vh",background:C.bg,color:C.text}}>

      {/* ★★★ SCAN LANDING PAGE — เต็มจอ ไม่มี sidebar ★★★ */}
      {scanLanding && <ScanLandingPage
        scanLanding={scanLanding}
        session={session} rm={rm}
        mgMap={mgMap}
        onSubmit={async(qty,note,reqUser)=>{
          if(reqUser&&(!session||session.id!==reqUser.id))establishSession(reqUser);
          const user=reqUser||session;
          if(scanLanding.part){
            await addPending(scanLanding.part.id,qty,note,user);
          }else{
            await addPendingByCode(scanLanding.code,qty,note,user);
          }
          setScanLanding(prev=>({...prev,submitted:true}));
        }}
        onClose={()=>setScanLanding(null)}
      />}

      {notif&&<div className="anim-fade" style={{position:"fixed",top:mob?60:16,right:mob?8:20,left:mob?8:"auto",zIndex:999,
        background:notif.type==="warn"?"#fffbeb":notif.type==="err"?"#fef2f2":"#f0fdf4",
        border:"1px solid "+(notif.type==="warn"?"#fcd34d":notif.type==="err"?"#fca5a5":"#86efac"),
        color:notif.type==="warn"?"#92400e":notif.type==="err"?"#991b1b":"#166534",
        padding:"10px 16px",borderRadius:10,fontSize:12,fontWeight:500,boxShadow:"0 4px 16px rgba(0,0,0,.13)"}}>{notif.msg}</div>}

      {/* Mobile Header */}
      <div className="mob-header" style={{display:"none",position:"fixed",top:0,left:0,right:0,height:50,background:C.sidebar,zIndex:201,alignItems:"center",padding:"0 12px",gap:10}}>
        <button style={{background:"none",border:"none",color:"#f1f5f9",fontSize:22,cursor:"pointer",padding:4}} onClick={()=>setSideOpen(!sideOpen)}>☰</button>
        <span style={{color:"#f1f5f9",fontSize:14,fontWeight:700,flex:1}}>⚙ SpareTrack</span>
        {syncing&&<span style={{fontSize:10,color:"#4ade80"}}>⏳</span>}
        {session&&<span style={{fontSize:11,color:"#94a3b8"}}>{session.name}</span>}
      </div>

      {/* Sidebar overlay (mobile) */}
      <div className={"sidebar-overlay"+(sideOpen?" open":"")} onClick={()=>setSideOpen(false)}/>

      {/* Sidebar */}
      <aside className={"desktop-sidebar"+(sideOpen?" open":"")} style={{width:mob?260:220,background:C.sidebar,minHeight:"100vh",position:"fixed",top:mob?0:0,left:0,zIndex:200,display:"flex",flexDirection:"column"}}>
        {mob&&<div style={{display:"flex",justifyContent:"flex-end",padding:"8px 12px"}}>
          <button style={{background:"none",border:"none",color:"#94a3b8",fontSize:20,cursor:"pointer"}} onClick={()=>setSideOpen(false)}>✕</button></div>}
        <SidebarContent/>
      </aside>

      {/* Main */}
      <div className="main-content" style={{marginLeft:mob?0:220,minHeight:"100vh",paddingTop:mob?50:0}}>

        {page==="dashboard"&&<div style={{padding:mob?16:32}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
            <div><div style={{fontSize:mob?18:22,fontWeight:700}}>Dashboard</div>
              <div style={{fontSize:12,color:C.sub,marginTop:2}}>ภาพรวม Spare Part</div></div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {GSheet.ok()&&<button style={btn("outline",{fontSize:11,padding:"6px 10px"})} onClick={syncToSheets}>{syncing?"⏳":"🔄"}</button>}
              <button style={btn("primary",{fontSize:12,padding:"8px 12px"})} onClick={()=>setAddM(true)}>+ เพิ่ม Part</button></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(4,1fr)",gap:mob?8:14,marginBottom:20}}>
            {[{l:"Spare Parts",v:parts.length,c:"#3b82f6"},{l:"รอการอนุมัติ",v:pending.length,c:pending.length>0?"#f59e0b":"#10b981"},
              {l:"Stock ต่ำ",v:alerts.length,c:alerts.length>0?"#dc2626":"#10b981"},{l:"รายการทั้งหมด",v:txs.length,c:"#8b5cf6"}].map((s,i)=>
              <div key={i} style={card({padding:mob?"12px":"18px 20px"})}><div style={{fontSize:10,fontWeight:600,color:C.sub,textTransform:"uppercase",marginBottom:6}}>{s.l}</div>
                <div style={{fontSize:mob?22:30,fontWeight:700,color:s.c}}>{s.v}</div></div>)}
          </div>
          <div style={card({padding:mob?12:20,marginBottom:16})}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:12}}>สรุปตามเครื่องจักร</div>
            <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(auto-fill,minmax(140px,1fr))",gap:10}}>
              {mgs.map(mg=>{const mp=parts.filter(p=>p.mgId===mg.id);const al=mp.filter(p=>["critical","low"].includes(stockStatus(p)));
                return<div key={mg.id} style={{borderRadius:8,border:"1.5px solid "+mg.color+"33",background:mg.color+"0d",padding:mob?"10px":"14px",cursor:"pointer"}}
                  onClick={()=>{setSelMG(mg.id);goPage("parts");}}>
                  <div style={{fontSize:20,marginBottom:4}}>{mg.icon}</div>
                  <div style={{fontWeight:600,fontSize:12}}>{mg.name}</div>
                  <div style={{fontSize:10,color:C.sub}}>{mp.length} รายการ</div>
                  {al.length>0&&<div style={{marginTop:4,fontSize:10,color:"#dc2626",fontWeight:600}}>⚠ {al.length}</div>}
                </div>;})}
            </div>
          </div>
          {alerts.length>0&&<div style={card({padding:mob?12:20,marginBottom:16,borderColor:"#fca5a5"})}>
            <div style={{fontWeight:700,fontSize:13,color:"#dc2626",marginBottom:10}}>⚠ Stock ต่ำ</div>
            {alerts.slice(0,5).map(p=><div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid #fef2f2",fontSize:12}}>
              <span>{mgMap[p.mgId]?.icon}</span><span style={sBadge(stockStatus(p))}>{statusCfg[stockStatus(p)].label}</span>
              <span style={{fontWeight:500,flex:1}}>{p.name}</span>
              <span style={{fontWeight:700,color:"#dc2626"}}>{p.stock}/{p.min}</span></div>)}
          </div>}
          <div style={card({padding:mob?12:20})}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>รายการล่าสุด</div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",minWidth:500,borderCollapse:"collapse",fontSize:12}}>
                <thead><tr>{["วันที่","รหัส","ชื่อ","ประเภท","จำนวน"].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
                <tbody>{txs.slice(0,5).map(t=><tr key={t.id}>
                  <td style={TD}><span style={{color:C.sub,fontSize:10}}>{new Date(t.createdAt).toLocaleString("th-TH",{dateStyle:"short",timeStyle:"short"})}</span></td>
                  <td style={TD}><code style={{background:"#f3f4f6",padding:"1px 4px",borderRadius:3,fontSize:10}}>{t.partCode}</code></td>
                  <td style={{...TD,fontWeight:500}}>{t.partName}</td>
                  <td style={TD}><span style={{fontSize:10,fontWeight:600,color:t.type==="withdraw"?"#dc2626":"#16a34a"}}>{t.type==="withdraw"?"▼เบิก":"▲รับ"}</span></td>
                  <td style={TD}><strong>{t.qty}</strong></td></tr>)}
                  {txs.length===0&&<tr><td colSpan={5} style={{...TD,textAlign:"center",padding:24,color:C.muted}}>ยังไม่มีรายการ</td></tr>}
                </tbody></table>
            </div>
          </div>
        </div>}

        {page==="parts"&&<div style={{display:"flex",flexDirection:mob?"column":"row",minHeight:mob?"auto":"100vh"}}>
          {/* MG filter */}
          <div style={{background:"#fff",borderBottom:mob?("1px solid "+C.border):"none",borderRight:mob?"none":("1px solid "+C.border),
            padding:mob?"12px":"24px 0",flexShrink:0,width:mob?"100%":190,overflowX:mob?"auto":"visible"}}>
            <div style={{display:mob?"flex":"block",gap:6}}>
              {[{id:null,icon:"🔧",name:"ทั้งหมด",color:"#6b7280"},...mgs].map(mg=>{
                const act=selMG===mg.id;const cnt=mg.id?parts.filter(p=>p.mgId===mg.id).length:parts.length;
                return<div key={mg.id||"all"} style={{display:"flex",alignItems:"center",gap:6,
                  padding:mob?"6px 12px":"8px 14px",cursor:"pointer",whiteSpace:"nowrap",
                  background:act?(mg.color+"12"):"transparent",borderRadius:mob?20:0,
                  border:mob?(act?("2px solid "+mg.color):"1px solid "+C.border):"none",
                  borderLeft:mob?"none":(act?("3px solid "+mg.color):"3px solid transparent"),fontSize:12}}
                  onClick={()=>{setSelMG(mg.id);setSelCat("all");}}>
                  <span style={{fontSize:14}}>{mg.icon}</span>
                  <span style={{fontWeight:act?600:400,color:act?mg.color:C.text}}>{mg.name}</span>
                  <span style={{fontSize:10,color:C.muted}}>({cnt})</span>
                </div>;})}
            </div>
          </div>
          <div style={{flex:1,padding:mob?12:24,overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
              <div><div style={{fontSize:mob?15:18,fontWeight:700}}>{selMG?(mgMap[selMG]?.icon+" "+mgMap[selMG]?.name):"ทั้งหมด"}</div>
                <div style={{fontSize:11,color:C.sub}}>{filtered.length} รายการ</div></div>
              <div style={{display:"flex",gap:6}}>
                <input style={inp({width:mob?140:200,fontSize:12})} placeholder="ค้นหา..." value={search} onChange={e=>setSearch(e.target.value)}/>
                <button style={btn("primary",{fontSize:11,padding:"6px 10px"})} onClick={()=>setAddM(true)}>+ เพิ่ม</button></div>
            </div>
            {/* Category tabs */}
            <div style={{display:"flex",gap:0,marginBottom:16,borderBottom:"2px solid "+C.border,overflowX:"auto"}}>
              {["all",...catList].map(cat=>{const act=selCat===cat;
                return<div key={cat} style={{padding:"6px 12px",cursor:"pointer",whiteSpace:"nowrap",fontSize:12,fontWeight:act?700:500,
                  color:act?C.primary:C.sub,borderBottom:act?("2px solid "+C.primary):"2px solid transparent",marginBottom:-2}}
                  onClick={()=>setSelCat(cat)}>{cat==="all"?"ทั้งหมด":cat}</div>;})}
            </div>
            {filtered.length===0?<div style={{textAlign:"center",padding:40,color:C.muted}}>ไม่พบ</div>
            :<div style={{display:"grid",gridTemplateColumns:mob?"1fr":"repeat(auto-fill,minmax(260px,1fr))",gap:mob?10:12}}>
              {filtered.map(p=>{const st=stockStatus(p),mg=mgMap[p.mgId],pct=Math.min(100,(p.stock/p.max)*100);
                return<div key={p.id} style={card({padding:mob?12:14})}>
                  {mg&&<div style={{display:"inline-flex",alignItems:"center",gap:3,marginBottom:8,
                    background:mg.color+"15",border:"1px solid "+mg.color+"33",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:600,color:mg.color}}>
                    {mg.icon} {mg.name}</div>}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                    <div><code style={{fontSize:9,color:C.muted,display:"block",marginBottom:2}}>{p.partCode}</code>
                      <div style={{fontWeight:600,fontSize:13}}>{p.name}</div>
                      <div style={{fontSize:10,color:C.sub}}>{p.cat}·{p.loc}</div></div>
                    <span style={sBadge(st)}>{statusCfg[st].label}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <strong style={{fontSize:13}}>{p.stock} {p.unit}</strong>
                    <span style={{fontSize:10,color:C.muted}}>Min{p.min}·Max{p.max}</span></div>
                  <div style={{height:4,borderRadius:2,background:"#f3f4f6",overflow:"hidden",marginBottom:10}}>
                    <div style={{height:"100%",width:pct+"%",borderRadius:2,background:st==="critical"?"#dc2626":st==="low"?"#f59e0b":st==="over"?"#3b82f6":"#10b981"}}/></div>
                  <div style={{display:"flex",gap:4}}>
                    <button style={btn("default",{flex:1,justifyContent:"center",fontSize:11,padding:"6px"})} onClick={()=>setStkM({part:p,mode:"withdraw"})}>▼เบิก</button>
                    <button style={btn("outline",{flex:1,justifyContent:"center",fontSize:11,padding:"6px"})} onClick={()=>setStkM({part:p,mode:"receive"})}>▲รับ</button>
                    <button style={btn("ghost",{padding:"6px 8px",fontSize:12})} onClick={()=>setQrM(p)}>⬡</button>
                  </div></div>;})}
            </div>}
          </div>
        </div>}

        {page==="scan"&&<ScanQRPage parts={parts} mgs={mgs} mgMap={mgMap} onScan={handleScanQR} session={session} rm={rm} mob={mob} onLogin={()=>setLoginM(true)} onLogout={logoutSession}/>}
        {page==="approve"&&<ApprovePage session={session} pending={pending} txs={txs} mgs={mgs} mgMap={mgMap} parts={parts} onApproveAll={approveAll} onDelete={deletePending} onLogin={()=>setLoginM(true)} mob={mob}/>}
        {page==="txs"&&<TxPage txs={txs} mgMap={mgMap} onExport={exportCSV} mob={mob}/>}
        {page==="settings"&&<SettingsPage mgs={mgs} parts={parts} mgMap={mgMap} onSaveMGs={async g=>{store(KEYS.mg,g);setMgs(g);notify("บันทึก");if(GSheet.ok())await GSheet.syncMGs(g);}} onDeletePart={doDeletePart} onPull={syncToSheets} onPush={pushAllNow} mob={mob}/>}
      </div>

      {/* Modals */}
      {addM&&<AddPartModal mgs={mgs} onAdd={doAddPart} onClose={()=>setAddM(false)} mob={mob}/>}
      {qrM&&<QRModal part={qrM} mg={mgMap[qrM.mgId]} onClose={()=>setQrM(null)} mob={mob}/>}
      {stkM&&<StockModal part={stkM.part} mode={stkM.mode} mg={mgMap[stkM.part.mgId]} session={session}
        onWithdraw={(pid,qty,note,ru)=>{if(ru&&(!session||session.id!==ru.id))establishSession(ru);addPending(pid,qty,note,ru||session);setStkM(null);}}
        onReceive={(pid,qty,note)=>{doReceive(pid,qty,note);setStkM(null);}} onClose={()=>setStkM(null)} mob={mob}/>}
      {loginM&&<LoginModal onLogin={u=>{establishSession(u);setLoginM(false);notify("ยินดีต้อนรับ "+u.name);if(u.role.toLowerCase()==="approver")goPage("approve");}} onClose={()=>setLoginM(false)}/>}
      {scanPopup&&<ScanWithdrawPopup part={scanPopup} mg={mgMap[scanPopup.mgId]} session={session} rm={rm}
        onSubmit={(qty,note,ru)=>{if(ru&&(!session||session.id!==ru.id))establishSession(ru);addPending(scanPopup.id,qty,note,ru||session);setScanPopup(null);}}
        onClose={()=>setScanPopup(null)}/>}
      {scanUnknown&&<QuickWithdrawPopup partCode={scanUnknown} session={session} rm={rm}
        onSubmit={(qty,note,ru)=>{if(ru&&(!session||session.id!==ru.id))establishSession(ru);addPendingByCode(scanUnknown,qty,note,ru||session);setScanUnknown(null);}}
        onClose={()=>setScanUnknown(null)}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
//  ★ SCAN LANDING PAGE — เต็มจอ เด้งทันทีเมื่อสแกน QR ★
//  ไม่มี sidebar, ไม่มี header — ประสบการณ์สแกนแล้วเบิกเลย
// ═══════════════════════════════════════════════════════════
function ScanLandingPage({scanLanding,session,rm,mgMap,onSubmit,onClose}){
  const{code,part,loading,error,submitted}=scanLanding;
  const[qty,setQty]=useState(1);
  const[note,setNote]=useState("");
  const[empId,setEmpId]=useState("");
  const[empErr,setEmpErr]=useState("");
  const needEmp=!session||session.role?.toLowerCase()==="approver";
  const mg=part?mgMap[part.mgId]:null;
  const st=part?stockStatus(part):null;

  function handle(){
    if(needEmp){
      const r=validateEmployeeId(empId);
      if(!r.ok){setEmpErr(r.err);return;}
      onSubmit(qty,note,r.user);
    }else{
      onSubmit(qty,note,session);
    }
  }

  // ── LOADING ──
  if(loading){
    return<div style={{position:"fixed",inset:0,zIndex:9999,background:"linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%)",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#fff"}}>
      <div style={{fontSize:60,marginBottom:20,animation:"pulse 1.5s infinite"}}>📱</div>
      <div style={{fontSize:20,fontWeight:700,marginBottom:8}}>กำลังค้นหา Spare Part...</div>
      <div style={{fontSize:14,color:"#94a3b8"}}><code style={{background:"#1e3a5f",padding:"4px 12px",borderRadius:6}}>{code}</code></div>
      <div style={{marginTop:20,width:40,height:40,border:"4px solid #334155",borderTopColor:"#3b82f6",borderRadius:"50%",
        animation:"spin 1s linear infinite"}}/>
      <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
    </div>;
  }

  // ── SUBMITTED SUCCESS ──
  if(submitted){
    return<div style={{position:"fixed",inset:0,zIndex:9999,background:"linear-gradient(135deg,#052e16 0%,#166534 100%)",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#fff",padding:24,textAlign:"center"}}>
      <div style={{fontSize:60,marginBottom:16}}>✅</div>
      <div style={{fontSize:22,fontWeight:700,marginBottom:8}}>ส่งคำขอเบิกสำเร็จ!</div>
      <div style={{background:"rgba(255,255,255,.15)",borderRadius:10,padding:16,marginBottom:8,maxWidth:320,width:"100%"}}>
        <div style={{fontSize:16,fontWeight:600}}>{part?part.name:code}</div>
        {part&&<div style={{fontSize:12,color:"#86efac",marginTop:4}}>{part.partCode}</div>}
        <div style={{fontSize:18,fontWeight:700,marginTop:8}}>จำนวน {qty} {part?part.unit:"ชิ้น"}</div>
        {note&&<div style={{fontSize:12,color:"#bbf7d0",marginTop:4}}>{note}</div>}
      </div>
      <div style={{fontSize:13,color:"#86efac",marginBottom:20}}>รอผู้อนุมัติตรวจสอบและตัดยอด</div>
      <button style={{background:"#fff",color:"#166534",border:"none",padding:"12px 32px",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer"}}
        onClick={onClose}>🏠 เข้าสู่ระบบหลัก</button>
      <div style={{marginTop:12,fontSize:12,color:"#4ade80"}}>หรือสแกน QR ตัวต่อไปได้เลย</div>
    </div>;
  }

  // ── MAIN: แสดง Part + ฟอร์มเบิก ──
  return<div style={{position:"fixed",inset:0,zIndex:9999,background:"#f4f5f7",overflowY:"auto"}}>
    {/* Header */}
    <div style={{background:"#0f172a",padding:"14px 16px",display:"flex",alignItems:"center",gap:10}}>

            <tr key={t.id} style={{background:i%2===0?"#fff":"#fafbfc"}}>
              <td style={{...TD,fontSize:10,color:C.sub}}>{new Date(t.createdAt).toLocaleString("th-TH",{dateStyle:"short",timeStyle:"short"})}</td>

          </tbody></table></div></div>}
  </div>;
}

// ═══ SETTINGS ═══
function SettingsPage({mgs,parts,mgMap,onSaveMGs,onDeletePart,onPull,onPush,mob}){
  const[list,setList]=useState(mgs.map(g=>({...g})));
  const[edit,setEdit]=useState(null);const[form,setForm]=useState({name:"",icon:"🤖",color:"#f59e0b"});
  const[stab,setStab]=useState("machines");const[confirmDel,setConfirmDel]=useState(null);const[partSearch,setPartSearch]=useState("");
  function save(){if(!form.name.trim())return;const next=edit==="new"?[...list,{id:uid(),...form}]:list.map(g=>g.id===edit?{...g,...form}:g);setList(next);onSaveMGs(next);setEdit(null);}
  const fp=parts.filter(p=>{const q=partSearch.toLowerCase();return!q||p.name.toLowerCase().includes(q)||p.partCode.toLowerCase().includes(q);});
  return<div style={{padding:mob?16:32,maxWidth:800}}>
    <div style={{fontSize:mob?16:20,fontWeight:700,marginBottom:20}}>ตั้งค่า</div>
    <div style={card({padding:mob?12:20,marginBottom:16})}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>🔗 Cloud Sync</div>
      {GSheet.ok()?<>
        <div style={{fontSize:12,color:"#16a34a",display:"flex",alignItems:"center",gap:4,marginBottom:10}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:"#16a34a",display:"inline-block"}}/>เชื่อมต่อแล้ว — Sync ทุก 30 วินาที</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <button style={btn("outline",{fontSize:11})} onClick={onPull}>⬇ ดึง</button>
          <button style={btn("outline",{fontSize:11})} onClick={onPush}>⬆ Push</button></div>
      </>:<div style={{fontSize:12,color:"#d97706"}}>⚠ ยังไม่ได้ตั้งค่า GAS_URL</div>}
    </div>
    <div style={{display:"flex",marginBottom:16,borderBottom:"2px solid "+C.border}}>
      {[{id:"machines",l:"🏭 เครื่องจักร"},{id:"parts",l:"🔧 Parts ("+parts.length+")"}].map(t=>
        <div key={t.id} style={{padding:"8px 14px",cursor:"pointer",fontSize:12,fontWeight:stab===t.id?700:500,
          color:stab===t.id?C.primary:C.sub,borderBottom:stab===t.id?("2px solid "+C.primary):"2px solid transparent",marginBottom:-2}}
          onClick={()=>setStab(t.id)}>{t.l}</div>)}</div>
    {stab==="machines"&&<div style={card({padding:mob?12:20})}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:14}}>กลุ่มเครื่องจักร</div>
        <button style={btn("primary",{fontSize:11})} onClick={()=>{setForm({name:"",icon:"🤖",color:"#f59e0b"});setEdit("new");}}>+ เพิ่ม</button></div>
      {edit&&<div style={{background:"#f8fafc",border:"1px solid "+C.border,borderRadius:8,padding:14,marginBottom:14}}>
        <div style={{marginBottom:10}}><span style={lbl()}>ชื่อ</span><input style={inp()} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
        <div style={{marginBottom:10}}><span style={lbl()}>ไอคอน</span>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{ICON_OPTS.map(ic=><div key={ic}
            style={{width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,borderRadius:4,cursor:"pointer",
              border:form.icon===ic?("2px solid "+C.primary):("1px solid "+C.border)}} onClick={()=>setForm(f=>({...f,icon:ic}))}>{ic}</div>)}</div></div>
        <div style={{marginBottom:12}}><span style={lbl()}>สี</span>
          <div style={{display:"flex",gap:6}}>{COLOR_OPTS.map(cl=><div key={cl}
            style={{width:24,height:24,borderRadius:"50%",background:cl,cursor:"pointer",outline:form.color===cl?("3px solid "+C.text):"none",outlineOffset:2}}
            onClick={()=>setForm(f=>({...f,color:cl}))}/>)}</div></div>
        <div style={{display:"flex",gap:6}}><button style={btn()} onClick={save}>✓</button><button style={btn("ghost")} onClick={()=>setEdit(null)}>ยกเลิก</button></div></div>}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {list.map((g,i)=><div key={g.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",border:"1px solid "+C.border,borderRadius:6,background:"#fff"}}>
          <div style={{width:30,height:30,borderRadius:6,background:g.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{g.icon}</div>
          <div style={{flex:1}}><div style={{fontWeight:600,fontSize:12}}>{g.name}</div></div>
          <button style={btn("outline",{fontSize:10,padding:"4px 8px"})} onClick={()=>{setForm({name:g.name,icon:g.icon,color:g.color});setEdit(g.id);}}>✎</button>

        </div>)}</div>

    {stab==="parts"&&<div style={card({padding:mob?12:20})}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>

      {fp.length===0?<div style={{textAlign:"center",padding:30,color:C.muted}}>ไม่พบ</div>
      :<div style={{display:"flex",flexDirection:"column",gap:4}}>
        {fp.map(p=>{const mg=mgMap[p.mgId],st=stockStatus(p);
          return<div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",border:"1px solid "+(confirmDel===p.id?"#fca5a5":C.border),borderRadius:6,background:confirmDel===p.id?"#fef2f2":"#fff"}}>
            <span style={{fontSize:14}}>{mg?.icon||"⚙"}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:12}}>{p.name}</div>
              <div style={{fontSize:10,color:C.sub}}>{p.partCode}·{p.stock}{p.unit}</div></div>
            <span style={sBadge(st)}>{statusCfg[st].label}</span>
            {confirmDel===p.id
              ?<div style={{display:"flex",gap:4}}>
                <button style={btn("danger",{fontSize:10,padding:"4px 8px"})} onClick={()=>{onDeletePart(p.id);setConfirmDel(null);}}>ลบ</button>
                <button style={btn("ghost",{fontSize:10,padding:"4px 6px"})} onClick={()=>setConfirmDel(null)}>✕</button></div>
              :<button style={btn("danger",{fontSize:10,padding:"4px 10px"})} onClick={()=>setConfirmDel(p.id)}>🗑</button>}
          </div>;})}
      </div>}
    </div>}
  </div>;
}

// ═══ MODALS ═══
function LoginModal({onLogin,onClose}){
  const[u,setU]=useState("");const[p,setP]=useState("");const[err,setErr]=useState("");const[needPw,setNeedPw]=useState(false);const[foundUser,setFoundUser]=useState(null);
  function tryLogin(){const users=getUsers();const found=users.find(x=>x.username===u.trim()||x.username.toLowerCase()===u.trim().toLowerCase());
    if(!found){setErr("ไม่พบรหัสนี้");return;}if(found.role.toLowerCase()==="approver"){if(!needPw){setNeedPw(true);setFoundUser(found);setErr("");return;}if(found.password!==p){setErr("รหัสผ่านผิด");return;}}onLogin(found);}
  return<div style={MOD}><div className="anim-fade" style={MODB(380)}>
    <div style={{textAlign:"center",marginBottom:20}}>
      <div style={{fontSize:32,marginBottom:6}}>{needPw?"🔒":"👷"}</div>
      <div style={{fontSize:16,fontWeight:700}}>{needPw?"ยืนยันผู้อนุมัติ":"เข้าสู่ระบบ"}</div>
      {needPw&&<div style={{fontSize:12,color:C.primary,marginTop:4,fontWeight:600}}>👔 {foundUser?.name}</div>}</div>
    {!needPw?<div style={{marginBottom:12}}><span style={lbl()}>รหัสพนักงาน</span>
      <input style={inp({fontSize:15,padding:"10px"})} placeholder="เช่น MTN, 2102278..." value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryLogin()} autoFocus/></div>
    :<div style={{marginBottom:12}}><span style={lbl()}>รหัสผ่าน</span>
      <input type="password" style={inp({fontSize:15,padding:"10px"})} value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryLogin()} autoFocus/></div>}
    {err&&<div style={{color:"#dc2626",fontSize:11,marginBottom:8,background:"#fef2f2",padding:"6px 10px",borderRadius:4}}>⚠ {err}</div>}
    <div style={{background:"#f8fafc",border:"1px solid "+C.border,borderRadius:6,padding:10,marginBottom:14,fontSize:11}}>
      <div>👷 ผู้ปฏิบัติงาน: ใส่รหัสพนักงาน (ไม่ต้องรหัสผ่าน)</div>
      <div style={{marginTop:3}}>👔 ผู้อนุมัติ: <code>admin</code> / <code>admin</code></div></div>
    <button style={btn("primary",{width:"100%",justifyContent:"center",padding:10})} onClick={tryLogin}>{needPw?"🔐 ยืนยัน":"เข้าสู่ระบบ"}</button>
    {needPw&&<button style={btn("outline",{width:"100%",justifyContent:"center",marginTop:6})} onClick={()=>{setNeedPw(false);setP("");setErr("");}}>← กลับ</button>}
    <button style={btn("ghost",{width:"100%",justifyContent:"center",marginTop:6})} onClick={onClose}>ยกเลิก</button>
  </div></div>;
}
function StockModal({part,mode,mg,session,onWithdraw,onReceive,onClose,mob}){
  const[qty,setQty]=useState(1);const[note,setNote]=useState("");const[empId,setEmpId]=useState("");const[empErr,setEmpErr]=useState("");
  const isW=mode==="withdraw";const needEmp=isW&&(!session||session.role.toLowerCase()==="approver");
  function handle(){if(needEmp){const r=validateEmployeeId(empId);if(!r.ok){setEmpErr(r.err);return;}onWithdraw(part.id,qty,note,r.user);}else{if(isW)onWithdraw(part.id,qty,note,session);else onReceive(part.id,qty,note);}}
  return<div style={MOD}><div className="anim-fade" style={MODB(440)}>
    <div style={{fontWeight:700,fontSize:15,marginBottom:3}}>{isW?"▼ ขอเบิก":"▲ รับเข้า"}</div>
    {mg&&<div style={{fontSize:11,color:mg.color,fontWeight:600,marginBottom:3}}>{mg.icon} {mg.name}</div>}
    <div style={{fontSize:12,color:C.sub,marginBottom:14}}>{part.name}·คงเหลือ <strong>{part.stock}</strong> {part.unit}</div>
    {isW&&<div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:6,padding:8,marginBottom:12,fontSize:11,color:"#1e40af"}}>📋 ส่งให้ผู้อนุมัติก่อน</div>}
    <div style={{marginBottom:10}}><span style={lbl()}>จำนวน</span><input type="number" min={1} max={isW?part.stock:99999} style={inp({width:100})} value={qty} onChange={e=>setQty(+e.target.value||1)}/></div>
    <div style={{marginBottom:12}}><span style={lbl()}>หมายเหตุ</span><input style={inp()} placeholder="ระบุงาน..." value={note} onChange={e=>setNote(e.target.value)}/></div>
    {needEmp&&<div style={{marginBottom:12,background:"#eff6ff",border:"2px solid #3b82f6",borderRadius:8,padding:12}}>
      <span style={{fontSize:13,fontWeight:700,color:"#1e40af"}}>🔑 รหัสพนักงาน</span>
      <input style={inp({fontSize:15,padding:"10px",marginTop:6})} placeholder="เช่น MTN..." value={empId} onChange={e=>{setEmpId(e.target.value);setEmpErr("");}} onKeyDown={e=>{if(e.key==="Enter")handle();}}/>
      {empErr&&<div style={{color:"#dc2626",fontSize:11,marginTop:4}}>⚠ {empErr}</div>}
    </div>}
    <div style={{display:"flex",gap:6}}>
      <button style={btn(isW?"primary":"success",{flex:1,justifyContent:"center"})} onClick={handle}>✓ {isW?"เบิก":"รับ"} {qty} {part.unit}</button>
      <button style={btn("ghost")} onClick={onClose}>ยกเลิก</button></div>
  </div></div>;
}
function QRModal({part,mg,onClose,mob}){
  const qv=makeQRUrl(part.partCode);const hasUrl=APP_URL&&APP_URL.length>5;const[copied,setCopied]=useState(false);
  return<div style={MOD} onClick={onClose}><div className="anim-fade" style={{...MODB(380),textAlign:"center"}} onClick={e=>e.stopPropagation()}>

    <div style={{display:"flex",justifyContent:"center",marginBottom:10}}><QR value={qv} size={mob?160:180}/></div>
    {hasUrl?<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:6,padding:8,marginBottom:10,fontSize:11,color:"#166534",textAlign:"left"}}>
      <strong>✓ พร้อมสแกน!</strong> กล้องมือถือ → Popup เบิกทันที</div>
    :<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:6,padding:8,marginBottom:10,fontSize:11,color:"#991b1b",textAlign:"left"}}>
      <strong>⚠</strong> เปิดจาก file:// — Host บน Vercel/Netlify ก่อน</div>}
    <div style={{fontSize:9,color:C.muted,marginBottom:10,wordBreak:"break-all",background:"#f8fafc",padding:6,borderRadius:4}}>{qv}</div>
    <button style={btn("primary",{width:"100%",justifyContent:"center"})} onClick={()=>window.print()}>⎙ Print</button>
    <button style={btn("ghost",{width:"100%",justifyContent:"center",marginTop:6})} onClick={onClose}>ปิด</button>
  </div></div>;
}
function AddPartModal({mgs,onAdd,onClose,mob}){
  const[f,setF]=useState({partCode:"",name:"",desc:"",unit:"ชิ้น",stock:0,min:5,max:100,loc:"",cat:"Bearing",mgId:mgs[0]?.id||""});
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  return<div style={MOD}><div className="anim-fade" style={MODB(480)}>
    <div style={{fontWeight:700,fontSize:15,marginBottom:16}}>เพิ่ม Spare Part</div>
    <div style={{marginBottom:12}}><span style={lbl()}>เครื่องจักร *</span>
      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{mgs.map(mg=>{const act=f.mgId===mg.id;
        return<div key={mg.id} style={{display:"flex",alignItems:"center",gap:3,padding:"4px 10px",borderRadius:20,cursor:"pointer",fontSize:11,fontWeight:600,
          background:act?(mg.color+"18"):"#f3f4f6",border:"2px solid "+(act?mg.color:"transparent"),color:act?mg.color:C.sub}}
          onClick={()=>s("mgId",mg.id)}>{mg.icon} {mg.name}</div>;})}</div></div>
    <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:10,marginBottom:10}}>
      {[["partCode","รหัส Part","BRG-6205"],["name","ชื่อ","Bearing 6205"]].map(([k,l,ph])=>
        <div key={k}><span style={lbl()}>{l}</span><input style={inp()} placeholder={ph} value={f[k]} onChange={e=>s(k,e.target.value)}/></div>)}</div>
    <div style={{marginBottom:10}}><span style={lbl()}>คำอธิบาย</span><input style={inp()} value={f.desc} onChange={e=>s("desc",e.target.value)}/></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
      <div><span style={lbl()}>หน่วย</span><input style={inp()} value={f.unit} onChange={e=>s("unit",e.target.value)}/></div>
      <div><span style={lbl()}>หมวดหมู่</span><select style={inp()} value={f.cat} onChange={e=>s("cat",e.target.value)}>{PART_CATS.map(c=><option key={c}>{c}</option>)}</select></div></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
      {[["stock","Stock"],["min","Min"],["max","Max"]].map(([k,l])=>
        <div key={k}><span style={lbl()}>{l}</span><input type="number" style={inp()} value={f[k]} onChange={e=>s(k,e.target.value)}/></div>)}</div>
    <div style={{marginBottom:16}}><span style={lbl()}>ตำแหน่ง</span><input style={inp()} placeholder="A-01..." value={f.loc} onChange={e=>s("loc",e.target.value)}/></div>
    <div style={{display:"flex",gap:6}}>
      <button style={btn("primary",{flex:1,justifyContent:"center"})} onClick={()=>{if(!f.partCode||!f.name||!f.mgId)return;onAdd(f);}}>✓ บันทึก</button>
      <button style={btn("ghost")} onClick={onClose}>ยกเลิก</button></div>
  </div></div>;
}
