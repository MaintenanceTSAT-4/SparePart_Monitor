<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
const GAS_URL = "https://script.google.com/macros/s/AKfycbyiHkaG-WBhwh7QzdE5TcASYvWcVoTO6tXqlgucoTy6xSI9scz_dhL6ZzEnggM2_diU8w/exec";
const MANUAL_APP_URL = "";
const _autoUrl = window.location.href.split("?")[0].split("#")[0];
const IS_FILE = _autoUrl.startsWith("file:");
const APP_URL = (MANUAL_APP_URL || (IS_FILE ? "" : _autoUrl));

const GSheet = {
  ok(){ return GAS_URL && GAS_URL.length > 10; },
  async _post(action, data){
    if(!this.ok()) return {ok:false, error:"no GAS_URL"};
    try{
      const r = await fetch(GAS_URL, {
        method: "POST",
        headers: {"Content-Type": "text/plain"},
        body: JSON.stringify({action, data})
      });
      return await r.json();
    }catch(e){ return {ok:false, error:String(e)}; }
  },
  async _get(action){
    if(!this.ok()) return {ok:false, error:"no GAS_URL"};
    try{
      const r = await fetch(GAS_URL + "?action=" + encodeURIComponent(action), {method:"GET"});
      return await r.json();
    }catch(e){ return {ok:false, error:String(e)}; }
  },
  getAll(){ return this._get("getAll"); },
  syncParts(parts){ return this._post("syncParts", parts); },
  syncMGs(mgs){ return this._post("syncMGs", mgs); },
  syncPending(pending){ return this._post("syncPending", pending); },
  addPending(row){ return this._post("addPending", row); },
  addPart(row){ return this._post("addPart", row); },
  addTx(row){ return this._post("addTx", row); },
  deletePending(id){ return this._post("deletePending", {id}); },
  clearPending(){ return this._post("clearPending"); },
  deletePart(id){ return this._post("deletePart", {id}); },
};

const KEYS={parts:"spt_parts",tx:"spt_tx",mg:"spt_mg",pending:"spt_pending",users:"spt_users",session:"spt_scan_session"};
const SESSION_TTL_MS = 24 * 60 * 60 * 1000;
const DEFAULT_MG=[
  {id:"mg1",name:"Robot ABB",icon:"🤖",color:"#f59e0b"},
  {id:"mg2",name:"Robot Yaskawa",icon:"🦾",color:"#10b981"},
  {id:"mg3",name:"Trulaser Cell",icon:"⚡",color:"#3b82f6"},
  {id:"mg4",name:"Fronius",icon:"🔥",color:"#ef4444"},
  {id:"mg5",name:"Hydroforming",icon:"💧",color:"#8b5cf6"},
  {id:"mg6",name:"Bending",icon:"⚙️",color:"#f97316"},
  {id:"mg7",name:"Press",icon:"🔩",color:"#ec4899"},
];
const PART_CATS=["Bearing","Belt","Seal","Gear","Filter","Pump","Valve","Motor","Sensor","Electrical","Hydraulic","Pneumatic","Other"];
const ICON_OPTS=["🤖","🦾","⚡","🔥","💧","⚙️","🔩","🏭","🛠️","⚒️","🔧","🔨","🪛","💡","🧲"];
const COLOR_OPTS=["#f59e0b","#10b981","#3b82f6","#ef4444","#8b5cf6","#f97316","#ec4899","#06b6d4","#84cc16","#6b7280"];
const DEFAULT_USERS=[
  {id:"u1",username:"MTN",name:"Maintenance",role:"User",dept:"Maintenance",password:"1234"},
  {id:"u2",username:"2102278",name:"เจ้าสัว",role:"User",dept:"Maintenance",password:"1234"},
  {id:"u3",username:"2101740",name:"กีรติวุฒิ",role:"User",dept:"Supervisor",password:"1234"},
  {id:"u4",username:"2101728",name:"ณัฐภัทร",role:"User",dept:"Maintenance",password:"1234"},
  {id:"u5",username:"2102353",name:"พิชัย",role:"User",dept:"Maintenance",password:"1234"},
  {id:"u6",username:"2102396",name:"สมหวัง",role:"User",dept:"Maintenance",password:"1234"},
  {id:"u7",username:"2103340",name:"เจนณรงค์",role:"User",dept:"Maintenance",password:"1234"},
  {id:"u8",username:"2101637",name:"อำพรรณ์",role:"User",dept:"Manager",password:"1234"},
  {id:"u9",username:"admin",name:"admin",role:"approver",dept:"Management",password:"admin"},
  {id:"u10",username:"2101887",name:"พี่บ่าววี",role:"User",dept:"Maintenance",password:"1234"},
];
const _now=new Date().toISOString();
const INIT_PARTS=[
  {id:"p1",partCode:"ABB-BRG-6205",name:"Bearing 6205",desc:"Deep groove ball bearing",unit:"ชิ้น",stock:45,min:10,max:100,loc:"A-01",cat:"Bearing",mgId:"mg1",createdAt:_now},
];

const load=(k,fb)=>{try{return JSON.parse(localStorage.getItem(k))||fb;}catch{return fb;}};
const store=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const uid=()=>Math.random().toString(36).slice(2,10);
function initDB(){
  if(!localStorage.getItem(KEYS.parts)) store(KEYS.parts,INIT_PARTS);
  if(!localStorage.getItem(KEYS.tx)) store(KEYS.tx,[]);
  if(!localStorage.getItem(KEYS.mg)) store(KEYS.mg,DEFAULT_MG);
  if(!localStorage.getItem(KEYS.pending)) store(KEYS.pending,[]);
  store(KEYS.users,DEFAULT_USERS);
}
const getParts=()=>load(KEYS.parts,INIT_PARTS);
const getTx=()=>load(KEYS.tx,[]);
const getMGs=()=>load(KEYS.mg,DEFAULT_MG);
const getPending=()=>load(KEYS.pending,[]);
const getUsers=()=>load(KEYS.users,DEFAULT_USERS);

async function pullFromCloud(){
  if(!GSheet.ok()) return {ok:false, error:"GAS_URL ไม่ได้ตั้งค่า"};
  const r = await GSheet.getAll();
  if(!r || !r.ok || !r.data) return {ok:false, error:r?.error || "ดึงข้อมูลไม่สำเร็จ"};
  const d = r.data;
  const numFields = ["stock","min","max","qty","stockBefore","stockAfter"];
  const coerce = (rows) => (rows||[]).map(row => {
    const o = {...row};
    numFields.forEach(k => { if(o[k] !== undefined && o[k] !== "" && o[k] !== null) o[k] = Number(o[k]) || 0; });
    return o;
  });
  if(d.parts && d.parts.length > 0) store(KEYS.parts, coerce(d.parts));
  if(d.mgs && d.mgs.length > 0) store(KEYS.mg, d.mgs);
  store(KEYS.pending, coerce(d.pending || []));
  store(KEYS.tx, coerce(d.tx || []));
  return {ok:true, ts:r.ts};
}
async function pushAllToCloud(){
  if(!GSheet.ok()) return {ok:false};
  await GSheet.syncMGs(getMGs());
  await GSheet.syncParts(getParts());
  await GSheet.syncPending(getPending());
  return {ok:true};
}

function getCachedSession(){
  try{
    const raw = localStorage.getItem(KEYS.session);
    if(!raw) return null;
    const obj = JSON.parse(raw);
    if(!obj || !obj.user || !obj.timestamp) return null;
    if(Date.now() - obj.timestamp > SESSION_TTL_MS){
      localStorage.removeItem(KEYS.session);
      return null;
    }
    return obj;
  }catch{return null;}
}
function setCachedSession(user){
  localStorage.setItem(KEYS.session, JSON.stringify({user, timestamp: Date.now()}));
}
function clearCachedSession(){ localStorage.removeItem(KEYS.session); }
function getRemainingMs(){
  const s = getCachedSession();
  if(!s) return 0;
  return Math.max(0, SESSION_TTL_MS - (Date.now() - s.timestamp));
}
function formatRemaining(ms){
  if(ms<=0) return "หมดอายุ";
  const totalMin = Math.floor(ms/60000);
  const h = Math.floor(totalMin/60), m = totalMin%60;
  return h>0 ? (h + " ชม. " + m + " น.") : (m + " นาที");
}
function validateEmployeeId(id){
  const trimmed = (id||"").trim();
  if(!trimmed) return {ok:false,err:"กรุณาใส่รหัสพนักงาน"};
  const users = getUsers();
  const found = users.find(u => u.username === trimmed || u.username.toLowerCase() === trimmed.toLowerCase());
  if(!found) return {ok:false,err:"ไม่พบรหัสพนักงานนี้ในระบบ"};
  return {ok:true,user:found};
}

function stockStatus(p){
  if(p.stock<=p.min) return "critical";
  if(p.stock<=p.min*1.5) return "low";
  if(p.stock>=p.max) return "over";
  return "ok";
}
const statusCfg={
  critical:{label:"Critical",bg:"#fef2f2",color:"#dc2626",border:"#fca5a5"},
  low:{label:"Low",bg:"#fffbeb",color:"#d97706",border:"#fcd34d"},
  over:{label:"Over",bg:"#eff6ff",color:"#2563eb",border:"#93c5fd"},
  ok:{label:"Normal",bg:"#f0fdf4",color:"#16a34a",border:"#86efac"},
};
function sBadge(st){
  const c = statusCfg[st] || statusCfg.ok;
  return {display:"inline-block",padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:600,
    background:c.bg,color:c.color,border:"1px solid "+c.border};
}
function QR({value,size=140}){
  const url = "https://api.qrserver.com/v1/create-qr-code/?size=" + size + "x" + size + "&data=" + encodeURIComponent(value) + "&choe=UTF-8";
  return <div style={{display:"inline-block",background:"#fff",borderRadius:8,padding:8,
    boxShadow:"0 2px 8px rgba(0,0,0,.08)",border:"1px solid "+C.border}}>
    <img src={url} alt="QR" width={size} height={size} style={{display:"block"}}/></div>;
}
function makeQRUrl(partCode){
  if(!APP_URL) return partCode;
  return APP_URL + "?scan=" + encodeURIComponent(partCode);
}

const C={bg:"#f4f5f7",border:"#e2e4e9",text:"#111827",sub:"#6b7280",muted:"#9ca3af",
  primary:"#1d4ed8",primaryL:"#eff6ff",sidebar:"#0f172a",sidebarAct:"#1e3a5f"};
const btn=(v,ex)=>{
  v = v || "primary";
  ex = ex || {};
  const base={padding:"8px 16px",borderRadius:6,border:"none",cursor:"pointer",
    fontSize:13,fontWeight:600,display:"inline-flex",alignItems:"center",gap:6};
  const variants = {
    primary:{background:C.primary,color:"#fff"},
    danger:{background:"#dc2626",color:"#fff"},
    success:{background:"#16a34a",color:"#fff"},
    outline:{background:"#fff",color:C.text,border:"1px solid "+C.border},
    ghost:{background:"transparent",color:C.sub},
    default:{background:"#f3f4f6",color:C.text}
  };
  return {...base, ...(variants[v]||variants.default), ...ex};
};
const inp=(ex)=>({width:"100%",padding:"9px 12px",borderRadius:6,border:"1px solid "+C.border,
  fontSize:13,outline:"none",background:"#fff",boxSizing:"border-box",color:C.text,...(ex||{})});
const card=(ex)=>({background:"#fff",borderRadius:10,border:"1px solid "+C.border,...(ex||{})});
const MOD={position:"fixed",inset:0,background:"rgba(0,0,0,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16};
const MODB=(w)=>({background:"#fff",borderRadius:14,padding:28,width:"100%",maxWidth:w||520,maxHeight:"90vh",overflowY:"auto"});
const TH={padding:"10px 14px",textAlign:"left",borderBottom:"2px solid "+C.border,color:C.sub,fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:".04em"};
const TD={padding:"11px 14px",borderBottom:"1px solid "+C.bg,verticalAlign:"middle",fontSize:13};
const lbl=(ex)=>({fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:5,...(ex||{})});

function App(){
  const [page,setPage]=useState("dashboard");
  const [parts,setParts]=useState([]);
  const [txs,setTxs]=useState([]);
  const [mgs,setMgs]=useState([]);
  const [pending,setPending]=useState([]);
  const [session,setSession]=useState(null);
  const [notif,setNotif]=useState(null);
  const [selMG,setSelMG]=useState(null);
  const [selCat,setSelCat]=useState("all");
  const [search,setSearch]=useState("");
  const [qrM,setQrM]=useState(null);
  const [addM,setAddM]=useState(false);
  const [stkM,setStkM]=useState(null);
  const [loginM,setLoginM]=useState(false);
  const [scanPopup,setScanPopup]=useState(null);
  const [scanUnknown,setScanUnknown]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [tick,setTick]=useState(0);
  const [printAllM,setPrintAllM]=useState(false);

  function refresh(){setParts(getParts());setTxs(getTx());setMgs(getMGs());setPending(getPending());}
  function notify(msg,type){setNotif({msg,type:type||"ok"});setTimeout(()=>setNotif(null),3500);}
  function establishSession(user){ setSession(user); setCachedSession(user); }
  function logoutSession(){ setSession(null); clearCachedSession(); notify("ออกจากระบบและล้าง session แล้ว","warn"); }

  useEffect(()=>{
    initDB();refresh();
    const cached = getCachedSession();
    if(cached && cached.user) setSession(cached.user);

    // ★ ตรวจ ?scan= ทันที (ก่อน Cloud pull) — popup ต้องเด้งเร็ว ★
    const params = new URLSearchParams(window.location.search);
    const scanCode = params.get("scan");
    const findPartByCode = (code) => {
      const allParts = getParts();
      const cLower = code.toLowerCase();
      return allParts.find(x =>
        x.partCode === code || x.id === code ||
        (x.partCode && x.partCode.toLowerCase() === cLower));
    };
    if(scanCode){
      window.history.replaceState({}, "", window.location.href.split("?")[0]);
      const p = findPartByCode(scanCode);
      if(p){
        setScanPopup(p);
        setPage("scan");
        notify("📱 สแกน " + p.name + " สำเร็จ");
      } else {
        (async () => {
          if(GSheet.ok()){
            const r = await pullFromCloud();
            if(r.ok){
              refresh();
              const p2 = findPartByCode(scanCode);
              if(p2){
                setScanPopup(p2);
                setPage("scan");
                notify("📱 สแกน " + p2.name + " สำเร็จ (จาก Cloud)");
                return;
              }
            }
          }
          setScanUnknown(scanCode);
          setPage("scan");
          notify("📱 สแกน " + scanCode + " (ไม่พบในฐานข้อมูล)", "warn");
        })();
      }
    }

    // Background: pull จาก Cloud
    (async ()=>{
      if(GSheet.ok()){
        setSyncing(true);
        const r = await pullFromCloud();
        setSyncing(false);
        if(r.ok){
          refresh();
          if(getParts().length <= 1){ await pushAllToCloud(); }
        } else {
          notify("ดึงข้อมูลจาก Cloud ล้มเหลว: " + (r.error||"-"), "warn");
        }
      }
    })();

    const onFocus = async ()=>{
      if(!GSheet.ok()) return;
      const r = await pullFromCloud();
      if(r.ok) refresh();
    };
    window.addEventListener("focus", onFocus);
    const poll = setInterval(async ()=>{
      if(document.visibilityState !== "visible") return;
      if(!GSheet.ok()) return;
      const r = await pullFromCloud();
      if(r.ok) refresh();
    }, 30000);
    const itv = setInterval(()=>setTick(t=>t+1), 60000);
    return ()=>{
      clearInterval(itv); clearInterval(poll);
      window.removeEventListener("focus", onFocus);
    };
  },[]);

  const mgMap=Object.fromEntries(mgs.map(m=>[m.id,m]));
  const alerts=parts.filter(p=>["critical","low"].includes(stockStatus(p)));

  async function syncToSheets(){
    if(!GSheet.ok()){notify("กรุณาตั้งค่า GAS_URL ก่อน","warn");return;}
    setSyncing(true);
    const r = await pullFromCloud();
    setSyncing(false);
    if(r.ok){ refresh(); notify("ดึงข้อมูลล่าสุดจาก Cloud สำเร็จ"); }
    else notify("ดึงข้อมูลล้มเหลว: " + (r.error||"-"), "warn");
  }
  async function pushAllNow(){
    if(!GSheet.ok()){notify("กรุณาตั้งค่า GAS_URL ก่อน","warn");return;}
    setSyncing(true); await pushAllToCloud(); setSyncing(false);
    notify("Push ข้อมูลทั้งหมดขึ้น Cloud สำเร็จ");
  }
  async function addPending(partId,qty,note,req){
    const ps=getParts(),p=ps.find(x=>x.id===partId);if(!p)return;
    const newRow={id:uid(),partId,partCode:p.partCode,partName:p.name,mgId:p.mgId,unit:p.unit,
      qty,note,requesterId:req?.id,requesterName:req?.name,requesterUsername:req?.username,
      createdAt:new Date().toISOString()};
    const rows=getPending(); rows.push(newRow);
    store(KEYS.pending,rows); refresh();
    notify("ส่งคำขอเบิก " + p.name + " x" + qty + " โดย " + (req?.username||"-"));
    if(GSheet.ok()) await GSheet.addPending(newRow);
  }
  async function addPendingByCode(partCode,qty,note,req){
    const newRow={id:uid(),partId:"unknown",partCode:partCode,partName:partCode,mgId:"-",unit:"ชิ้น",
      qty,note,requesterId:req?.id,requesterName:req?.name,requesterUsername:req?.username,
      createdAt:new Date().toISOString()};
    const rows=getPending(); rows.push(newRow);
    store(KEYS.pending,rows); refresh();
    notify("ส่งคำขอเบิก " + partCode + " x" + qty + " โดย " + (req?.username||"-"));
    if(GSheet.ok()) await GSheet.addPending(newRow);
  }
  async function approveAll(){
    const rows=getPending(),map={};
    rows.forEach(r=>{map[r.partId]=(map[r.partId]||0)+r.qty;});
    const ps=getParts(),txNew=getTx(),newTxs=[];
    Object.entries(map).forEach(([pid,qty])=>{
      const i=ps.findIndex(p=>p.id===pid);if(i===-1)return;
      const b=ps[i].stock;ps[i].stock=Math.max(0,b-qty);
      const tx={id:uid(),partId:pid,partCode:ps[i].partCode,partName:ps[i].name,
        mgId:ps[i].mgId,unit:ps[i].unit,type:"withdraw",qty,stockBefore:b,stockAfter:ps[i].stock,
        approvedBy:session?.name,note:"อนุมัติจากใบรายการประจำวัน",createdAt:new Date().toISOString()};
      txNew.unshift(tx);newTxs.push(tx);
    });
    store(KEYS.parts,ps);store(KEYS.tx,txNew);store(KEYS.pending,[]);
    refresh();notify("อนุมัติและตัดยอด " + Object.keys(map).length + " รายการสำเร็จ");
    if(GSheet.ok()){
      await GSheet.clearPending();
      for(const tx of newTxs) await GSheet.addTx(tx);
      await GSheet.syncParts(getParts());
    }
  }
  async function deletePending(id){
    store(KEYS.pending,getPending().filter(r=>r.id!==id));
    refresh();notify("ลบรายการแล้ว","warn");
    if(GSheet.ok()) await GSheet.deletePending(id);
  }
  async function doReceive(partId,qty,note){
    const ps=getParts(),i=ps.findIndex(p=>p.id===partId);if(i===-1)return;
    const b=ps[i].stock;ps[i].stock=b+qty;store(KEYS.parts,ps);
    const tx={id:uid(),partId,partCode:ps[i].partCode,partName:ps[i].name,
      mgId:ps[i].mgId,unit:ps[i].unit,type:"receive",qty,stockBefore:b,stockAfter:ps[i].stock,
      approvedBy:session?.name,note,createdAt:new Date().toISOString()};
    const txNew=getTx();txNew.unshift(tx);store(KEYS.tx,txNew);
    refresh();notify("รับเข้า " + ps[i].name + " จำนวน " + qty + " สำเร็จ");
    if(GSheet.ok()){ await GSheet.addTx(tx); await GSheet.syncParts(getParts()); }
  }
  async function doAddPart(data){
    const ps=getParts();
    const newPart={id:uid(),...data,stock:+data.stock,min:+data.min,max:+data.max,createdAt:new Date().toISOString()};
    ps.push(newPart); store(KEYS.parts,ps);
    refresh();
    notify("เพิ่ม " + data.name + " สำเร็จ");
    setAddM(false);
    if(GSheet.ok()) await GSheet.addPart(newPart);
  }
  async function doDeletePart(partId){
    store(KEYS.parts,getParts().filter(p=>p.id!==partId));
    store(KEYS.pending,getPending().filter(r=>r.partId!==partId));
    refresh();notify("ลบ Spare Part แล้ว","warn");
    if(GSheet.ok()) await GSheet.deletePart(partId);
  }
  function exportCSV(){
    const rows=[["วันที่","รหัส","ชื่อ","เครื่องจักร","ประเภท","จำนวน","ก่อน","หลัง","อนุมัติโดย","หมายเหตุ"]];
    txs.forEach(t=>rows.push([new Date(t.createdAt).toLocaleString("th-TH"),t.partCode,t.partName,
      mgMap[t.mgId]?.name||"-",t.type==="withdraw"?"เบิก":"รับเข้า",t.qty,t.stockBefore,t.stockAfter,t.approvedBy||"-",t.note||""]));
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob(["﻿"+rows.map(r=>r.join(",")).join("\n")],{type:"text/csv;charset=utf-8"}));
    a.download="spare_report.csv";a.click();notify("Export สำเร็จ");
  }
  function handleScanQR(val){
    const v=val.trim(); if(!v) return;
    let code=v;
    if(v.startsWith("SPAREPART:")) code=v.split(":")[2]||v.split(":")[1];
    const freshParts=getParts();
    const cLower=code.toLowerCase(), vLower=v.toLowerCase();
    const p=freshParts.find(x=>
      x.partCode===code || x.partCode===v ||
      x.partCode.toLowerCase()===cLower || x.partCode.toLowerCase()===vLower ||
      x.id===code || x.id===v);
    if(p){ setScanPopup(p); refresh(); }
    else setScanUnknown(code);
  }
  const mgParts=selMG?parts.filter(p=>p.mgId===selMG):parts;
  const catList=[...new Set(mgParts.map(p=>p.cat))].sort();
  const filtered=mgParts.filter(p=>{const q=search.toLowerCase();
    return (selCat==="all"||p.cat===selCat)&&(!q||p.name.toLowerCase().includes(q)||p.partCode.toLowerCase().includes(q));});
  const nav=[
    {id:"dashboard",label:"Dashboard",icon:"▦"},
    {id:"parts",label:"Spare Parts",icon:"⊞"},
    {id:"scan",label:"สแกน QR เบิก",icon:"📱"},
    {id:"approve",label:"ใบอนุมัติ",icon:"✔"},
    {id:"txs",label:"ประวัติรายการ",icon:"≡"},
    {id:"settings",label:"ตั้งค่า",icon:"⚙"},
  ];
  const remainingMs = session ? getRemainingMs() : 0;
  return (
    <div style={{fontFamily:"'DM Sans','Noto Sans Thai',sans-serif",minHeight:"100vh",background:C.bg,color:C.text}}>
      {notif && <div className="anim-fade" style={{position:"fixed",top:20,right:20,zIndex:999,
        background:notif.type==="warn"?"#fffbeb":notif.type==="err"?"#fef2f2":"#f0fdf4",
        border:"1px solid "+(notif.type==="warn"?"#fcd34d":notif.type==="err"?"#fca5a5":"#86efac"),
        color:notif.type==="warn"?"#92400e":notif.type==="err"?"#991b1b":"#166534",
        padding:"12px 20px",borderRadius:10,fontSize:13,fontWeight:500,boxShadow:"0 4px 16px rgba(0,0,0,.13)"}}>
        {notif.msg}</div>}
      <aside style={{width:220,background:C.sidebar,minHeight:"100vh",position:"fixed",top:0,left:0,zIndex:200,display:"flex",flexDirection:"column"}}>
        <div style={{padding:"22px 20px 18px",borderBottom:"1px solid #1e293b"}}>
          <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9"}}>⚙ SpareTrack</div>
          <div style={{fontSize:11,color:"#64748b",marginTop:2}}>QR Stock Management</div>
          {GSheet.ok() && <div className="sync-pulse" style={{marginTop:6,fontSize:10,color:"#4ade80",display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:"#4ade80",display:"inline-block"}}/>Cloud Sync Active</div>}
        </div>
        <div style={{flex:1,paddingTop:8}}>
          {nav.map(n=>{
            const act=page===n.id;
            const badge=n.id==="approve"?pending.length:n.id==="dashboard"?alerts.length:0;
            return <div key={n.id} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 20px",cursor:"pointer",
              color:act?"#f1f5f9":"#94a3b8",background:act?C.sidebarAct:"transparent",
              borderLeft:act?"3px solid #3b82f6":"3px solid transparent",fontSize:13,fontWeight:act?600:400}}
              onClick={()=>setPage(n.id)}>
              <span style={{fontSize:15}}>{n.icon}</span><span style={{flex:1}}>{n.label}</span>
              {badge>0 && <span style={{background:"#dc2626",color:"#fff",borderRadius:10,fontSize:10,padding:"1px 6px",fontWeight:700}}>{badge}</span>}
            </div>;
          })}
        </div>
        {GSheet.ok() && <div style={{padding:"8px 20px"}}>
          <button style={btn("outline",{width:"100%",justifyContent:"center",fontSize:11,padding:"7px 12px",color:"#94a3b8",borderColor:"#334155"})}
            onClick={syncToSheets} disabled={syncing}>{syncing?"⏳ Syncing...":"🔄 ดึงข้อมูลล่าสุด"}</button></div>}
        <div style={{padding:"14px 20px",borderTop:"1px solid #1e293b"}}>
          {session ? <>
            <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>
              {session.role.toLowerCase()==="approver"?"👔 ผู้อนุมัติ":"👷 ผู้เบิก (จำไว้ 24 ชม.)"}</div>
            <div style={{fontSize:13,color:"#f1f5f9",fontWeight:600,marginBottom:2}}>{session.name}</div>
            <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>{session.username} · {session.dept}</div>
            {remainingMs>0 && session.role.toLowerCase()!=="approver" &&
              <div style={{fontSize:10,color:"#4ade80",marginBottom:8}}>⏱ เหลือ {formatRemaining(remainingMs)}</div>}
            <button style={{...btn("ghost"),color:"#64748b",padding:"6px 0",fontSize:12}}
              onClick={logoutSession}>ออกจากระบบ</button>
          </> : <>
            <div style={{fontSize:12,color:"#64748b",marginBottom:8}}>ยังไม่ได้ระบุผู้เบิก</div>
            <button style={{...btn("outline"),width:"100%",justifyContent:"center",fontSize:12}}
              onClick={()=>setLoginM(true)}>🔑 ระบุผู้เบิก/ผู้อนุมัติ</button></>}
        </div>
      </aside>
      <div style={{marginLeft:220,minHeight:"100vh"}}>
        {page==="dashboard" && <DashboardPage parts={parts} txs={txs} mgs={mgs} mgMap={mgMap} alerts={alerts}
          pending={pending} onAddPart={()=>setAddM(true)} onGoMG={(id)=>{setSelMG(id);setPage("parts");}}
          onSync={syncToSheets} syncing={syncing}/>}
        {page==="parts" && <PartsPage parts={parts} filtered={filtered} mgs={mgs} mgMap={mgMap}
          selMG={selMG} setSelMG={id=>{setSelMG(id);setSelCat("all");}} selCat={selCat} setSelCat={setSelCat}
          catList={catList} search={search} setSearch={setSearch}
          onWithdraw={p=>setStkM({part:p,mode:"withdraw"})} onReceive={p=>setStkM({part:p,mode:"receive"})}
          onQR={p=>setQrM(p)} onAddPart={()=>setAddM(true)} onPrintAll={()=>setPrintAllM(true)}/>}
        {page==="scan" && <ScanQRPage parts={parts} mgs={mgs} mgMap={mgMap} onScan={handleScanQR}
          session={session} remainingMs={remainingMs} onLogout={logoutSession} onLogin={()=>setLoginM(true)}/>}
        {page==="approve" && <ApprovePage session={session} pending={pending} txs={txs}
          mgs={mgs} mgMap={mgMap} parts={parts}
          onApproveAll={approveAll} onDelete={deletePending} onLogin={()=>setLoginM(true)}/>}
        {page==="txs" && <TxPage txs={txs} mgMap={mgMap} onExport={exportCSV}/>}
        {page==="settings" && <SettingsPage mgs={mgs} parts={parts} mgMap={mgMap}
          onSaveMGs={async g=>{store(KEYS.mg,g);setMgs(g);notify("บันทึกสำเร็จ");if(GSheet.ok()) await GSheet.syncMGs(g);}}
          onDeletePart={doDeletePart} onPullCloud={syncToSheets} onPushCloud={pushAllNow}/>}
      </div>
      {addM && <AddPartModal mgs={mgs} onAdd={doAddPart} onClose={()=>setAddM(false)}/>}
      {qrM && <QRModal part={qrM} mg={mgMap[qrM.mgId]} onClose={()=>setQrM(null)}/>}
      {printAllM && <PrintQRSheetModal parts={filtered.length>0?filtered:parts} mgMap={mgMap} onClose={()=>setPrintAllM(false)}/>}
      {stkM && <StockModal part={stkM.part} mode={stkM.mode} mg={mgMap[stkM.part.mgId]} session={session}
        onWithdraw={(pid,qty,note,reqUser)=>{
          if(reqUser && (!session || session.id!==reqUser.id)) establishSession(reqUser);
          addPending(pid,qty,note,reqUser||session); setStkM(null);}}
        onReceive={(pid,qty,note)=>{doReceive(pid,qty,note);setStkM(null);}}
        onClose={()=>setStkM(null)}/>}
      {loginM && <LoginModal
        onLogin={u=>{establishSession(u);setLoginM(false);notify("ยินดีต้อนรับ " + u.name);if(u.role.toLowerCase()==="approver")setPage("approve");}}
        onClose={()=>setLoginM(false)}/>}
      {scanPopup && <ScanWithdrawPopup part={scanPopup} mg={mgMap[scanPopup.mgId]} session={session} remainingMs={remainingMs}
        onSubmit={(qty,note,reqUser)=>{
          if(reqUser && (!session || session.id!==reqUser.id)) establishSession(reqUser);
          addPending(scanPopup.id,qty,note,reqUser||session); setScanPopup(null);}}
        onClose={()=>setScanPopup(null)}/>}
      {scanUnknown && <QuickWithdrawPopup partCode={scanUnknown} session={session} remainingMs={remainingMs}
        onSubmit={(qty,note,reqUser)=>{
          if(reqUser && (!session || session.id!==reqUser.id)) establishSession(reqUser);
          addPendingByCode(scanUnknown,qty,note,reqUser||session); setScanUnknown(null);}}
        onClose={()=>setScanUnknown(null)}/>}
    </div>
  );
}

function DashboardPage({parts,txs,mgs,mgMap,alerts,pending,onAddPart,onGoMG,onSync,syncing}){
  return <div style={{padding:32}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:28}}>
      <div><div style={{fontSize:22,fontWeight:700}}>Dashboard</div>
        <div style={{fontSize:13,color:C.sub,marginTop:2}}>ภาพรวมระบบจัดการ Spare Part</div></div>
      <div style={{display:"flex",gap:8}}>
        {GSheet.ok() && <button style={btn("outline")} onClick={onSync} disabled={syncing}>{syncing?"⏳":"🔄"} ดึงข้อมูล</button>}
        <button style={btn()} onClick={onAddPart}>+ เพิ่ม Spare Part</button></div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:24}}>
      {[{l:"Spare Parts ทั้งหมด",v:parts.length,c:"#3b82f6"},{l:"รอการอนุมัติ",v:pending.length,c:pending.length>0?"#f59e0b":"#10b981"},
        {l:"แจ้งเตือน Stock ต่ำ",v:alerts.length,c:alerts.length>0?"#dc2626":"#10b981"},{l:"รายการทั้งหมด",v:txs.length,c:"#8b5cf6"}].map((s,i)=>
        <div key={i} style={card({padding:"18px 20px"})}><div style={{fontSize:11,fontWeight:600,color:C.sub,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>{s.l}</div>
          <div style={{fontSize:30,fontWeight:700,color:s.c}}>{s.v}</div></div>)}
    </div>
    <div style={card({padding:20,marginBottom:20})}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>สรุปตามเครื่องจักร</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:12}}>
        {mgs.map(mg=>{
          const mp=parts.filter(p=>p.mgId===mg.id);
          const al=mp.filter(p=>["critical","low"].includes(stockStatus(p)));
          return <div key={mg.id} style={{borderRadius:8,border:"1.5px solid "+mg.color+"33",background:mg.color+"0d",padding:"14px",cursor:"pointer"}}
            onClick={()=>onGoMG(mg.id)}>
            <div style={{fontSize:22,marginBottom:6}}>{mg.icon}</div>
            <div style={{fontWeight:600,fontSize:13,marginBottom:2}}>{mg.name}</div>
            <div style={{fontSize:11,color:C.sub}}>{mp.length} รายการ</div>
            {al.length>0 && <div style={{marginTop:6,fontSize:11,color:"#dc2626",fontWeight:600}}>⚠ {al.length} ต่ำกว่า Min</div>}
          </div>;
        })}
      </div>
    </div>
    {alerts.length>0 && <div style={card({padding:20,marginBottom:20,borderColor:"#fca5a5"})}>
      <div style={{fontWeight:700,fontSize:14,color:"#dc2626",marginBottom:14}}>⚠ แจ้งเตือน Stock ต่ำ</div>
      {alerts.map(p=>{const mg=mgMap[p.mgId],st=stockStatus(p);
        return <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #fef2f2"}}>
          <span style={{fontSize:18}}>{mg?.icon}</span><span style={sBadge(st)}>{statusCfg[st].label}</span>
          <span style={{fontWeight:500,flex:1}}>{p.name}</span>
          <span style={{fontSize:13,fontWeight:700,color:"#dc2626"}}>{p.stock}/{p.min} {p.unit}</span></div>;})}
    </div>}
    <div style={card({padding:20})}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>รายการล่าสุด</div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead><tr>{["วันที่","รหัส","ชื่อ","เครื่องจักร","ประเภท","จำนวน"].map(h=><th key={h} style={TH}>{h}</th>)}</tr></thead>
        <tbody>{txs.slice(0,7).map(t=>{const mg=mgMap[t.mgId];return <tr key={t.id}>
          <td style={TD}><span style={{color:C.sub,fontSize:12}}>{new Date(t.createdAt).toLocaleString("th-TH",{dateStyle:"short",timeStyle:"short"})}</span></td>
          <td style={TD}><code style={{background:"#f3f4f6",padding:"2px 6px",borderRadius:4,fontSize:11}}>{t.partCode}</code></td>
          <td style={{...TD,fontWeight:500}}>{t.partName}</td>
          <td style={TD}>{mg?(mg.icon+" "+mg.name):"-"}</td>
          <td style={TD}><span style={{fontSize:12,fontWeight:600,color:t.type==="withdraw"?"#dc2626":"#16a34a"}}>{t.type==="withdraw"?"▼ เบิก":"▲ รับเข้า"}</span></td>
          <td style={TD}><strong>{t.qty}</strong></td></tr>;})}
          {txs.length===0 && <tr><td colSpan={6} style={{...TD,textAlign:"center",padding:32,color:C.muted}}>ยังไม่มีรายการ</td></tr>}
        </tbody></table>
    </div>
  </div>;
}

function PartsPage({parts,filtered,mgs,mgMap,selMG,setSelMG,selCat,setSelCat,catList,search,setSearch,onWithdraw,onReceive,onQR,onAddPart,onPrintAll}){
  return <div style={{display:"flex",minHeight:"100vh"}}>
    <aside style={{width:200,background:"#fff",borderRight:"1px solid "+C.border,padding:"24px 0",flexShrink:0}}>
      <div style={{padding:"0 16px 14px",borderBottom:"1px solid "+C.border,marginBottom:8}}>
        <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".06em"}}>เครื่องจักร</div></div>
      {[{id:null,icon:"🔧",name:"ทั้งหมด",color:"#6b7280"},...mgs].map(mg=>{
        const active=selMG===mg.id;
        const count=mg.id?parts.filter(p=>p.mgId===mg.id).length:parts.length;
        return <div key={mg.id||"all"} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",cursor:"pointer",
          background:active?(mg.color+"12"):"transparent",borderLeft:active?("3px solid "+mg.color):"3px solid transparent"}}
          onClick={()=>setSelMG(mg.id)}>
          <span style={{fontSize:18}}>{mg.icon}</span>
          <div><div style={{fontSize:13,fontWeight:active?600:400,color:active?mg.color:C.text}}>{mg.name}</div>
            <div style={{fontSize:11,color:C.muted}}>{count} รายการ</div></div></div>;
      })}
    </aside>
    <div style={{flex:1,padding:28,overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div><div style={{fontSize:18,fontWeight:700}}>{selMG?(mgMap[selMG]?.icon+" "+mgMap[selMG]?.name):"Spare Parts ทั้งหมด"}</div>
          <div style={{fontSize:12,color:C.sub,marginTop:2}}>{filtered.length} รายการ</div></div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <input style={inp({width:200})} placeholder="ค้นหา..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <button style={btn("outline")} onClick={onPrintAll}>🖨 พิมพ์ QR ทั้งหมด</button>
          <button style={btn()} onClick={onAddPart}>+ เพิ่ม Part</button></div></div>
      <div style={{display:"flex",gap:0,marginBottom:24,borderBottom:"2px solid "+C.border,overflowX:"auto"}}>
        {["all",...catList].map(cat=>{
          const active=selCat===cat;
          const cnt=cat==="all"?(selMG?parts.filter(p=>p.mgId===selMG).length:parts.length):parts.filter(p=>p.cat===cat&&(selMG?p.mgId===selMG:true)).length;
          return <div key={cat} style={{padding:"8px 16px",cursor:"pointer",whiteSpace:"nowrap",fontSize:13,fontWeight:active?700:500,
            color:active?C.primary:C.sub,borderBottom:active?("2px solid "+C.primary):"2px solid transparent",marginBottom:-2}}
            onClick={()=>setSelCat(cat)}>{cat==="all"?"ทั้งหมด":cat}<span style={{marginLeft:5,fontSize:11,color:active?C.primary:C.muted}}>({cnt})</span></div>;
        })}</div>
      {filtered.length===0 ? <div style={{textAlign:"center",padding:60,color:C.muted}}>ไม่พบ Spare Part</div>
      : <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:14}}>
        {filtered.map(p=>{
          const st=stockStatus(p),mg=mgMap[p.mgId],pct=Math.min(100,(p.stock/p.max)*100);
          return <div key={p.id} style={card({padding:16})}>
            {mg && <div style={{display:"inline-flex",alignItems:"center",gap:4,marginBottom:10,
              background:mg.color+"15",border:"1px solid "+mg.color+"33",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:600,color:mg.color}}>
              {mg.icon} {mg.name}</div>}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div><code style={{fontSize:10,color:C.muted,display:"block",marginBottom:3}}>{p.partCode}</code>
                <div style={{fontWeight:600,fontSize:14}}>{p.name}</div>
                <div style={{fontSize:11,color:C.sub,marginTop:1}}>{p.cat} · {p.loc}</div></div>
              <span style={sBadge(st)}>{statusCfg[st].label}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <strong style={{fontSize:14}}>{p.stock} {p.unit}</strong>
              <span style={{fontSize:11,color:C.muted}}>Min {p.min} · Max {p.max}</span></div>
            <div style={{height:5,borderRadius:3,background:"#f3f4f6",overflow:"hidden",marginBottom:12}}>
              <div style={{height:"100%",width:pct+"%",borderRadius:3,
                background:st==="critical"?"#dc2626":st==="low"?"#f59e0b":st==="over"?"#3b82f6":"#10b981"}}/></div>
            <div style={{display:"flex",gap:6}}>
              <button style={btn("default",{flex:1,justifyContent:"center",fontSize:12})} onClick={()=>onWithdraw(p)}>▼ ขอเบิก</button>
              <button style={btn("outline",{flex:1,justifyContent:"center",fontSize:12})} onClick={()=>onReceive(p)}>▲ รับเข้า</button>
              <button style={btn("ghost",{padding:"8px 10px"})} onClick={()=>onQR(p)}>⬡</button></div></div>;
        })}</div>}
    </div>
  </div>;
}

function ApprovePage({session,pending,txs,mgs,mgMap,parts,onApproveAll,onDelete,onLogin}){
  const [tab,setTab]=useState("pending");
  const partMap=Object.fromEntries(parts.map(p=>[p.id,p]));
  const grouped=(()=>{
    const m={};
    pending.forEach(r=>{
      const pi=partMap[r.partId]||{};
      if(!m[r.partId]) m[r.partId]={partId:r.partId,partCode:r.partCode||pi.partCode||"-",
        partName:r.partName||pi.name||"-",unit:r.unit||pi.unit||"-",mgId:r.mgId||"-",
        requesterName:r.requesterName||"-",totalQty:0,rows:[]};
      m[r.partId].totalQty+=r.qty;
      m[r.partId].rows.push(r);
      if(r.requesterName && m[r.partId].requesterName==="-") m[r.partId].requesterName=r.requesterName;
    });
    return Object.values(m);
  })();
  const today=new Date().toLocaleDateString("th-TH",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
  if(!session || session.role?.toLowerCase()!=="approver") return <div style={{padding:60,textAlign:"center"}}>
    <div style={{fontSize:48,marginBottom:16}}>🔒</div><div style={{fontSize:18,fontWeight:700,marginBottom:8}}>ต้องการสิทธิ์ผู้อนุมัติ</div>
    <div style={{fontSize:13,color:C.sub,marginBottom:24}}>กรุณาเข้าสู่ระบบด้วยบัญชีผู้อนุมัติ</div>
    <button style={btn()} onClick={onLogin}>🔑 เข้าสู่ระบบ</button></div>;
  return <div style={{padding:32}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
      <div><div style={{fontSize:20,fontWeight:700}}>ใบรายการขอเบิก Spare Part</div>
        <div style={{fontSize:13,color:C.sub,marginTop:3}}>{GSheet.ok()?"Sync จาก Cloud ทุก 30 วินาที":"รายการในเครื่องนี้เท่านั้น"}</div></div>
      <div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:600,color:C.primary}}>👔 {session.name}</div>

        <div key={t.id} style={{padding:"9px 20px",cursor:"pointer",fontSize:13,fontWeight:tab===t.id?700:500,

          onClick={()=>setTab(t.id)}>{t.l}</div>)}</div>
    {tab==="pending" && (pending.length===0
      ? <div style={card({padding:60,textAlign:"center"})}><div style={{fontSize:40,marginBottom:12}}>✅</div>
        <div style={{fontSize:16,fontWeight:600}}>ไม่มีรายการรอการอนุมัติ</div></div>

  </div>;
}

function LoginModal({onLogin,onClose}){
  const [u,setU]=useState("");
  const [p,setP]=useState("");
  const [err,setErr]=useState("");
  const [needPw,setNeedPw]=useState(false);
  const [foundUser,setFoundUser]=useState(null);
  function tryLogin(){
    const users=getUsers();
    const found=users.find(x=>x.username===u.trim());
    if(!found){setErr("ไม่พบรหัสพนักงานนี้ในระบบ");return;}
    if(found.role.toLowerCase()==="approver"){
      if(!needPw){setNeedPw(true);setFoundUser(found);setErr("");return;}
      if(found.password!==p){setErr("รหัสผ่านไม่ถูกต้อง");return;}
    }
    onLogin(found);
  }
  return <div style={MOD}><div className="anim-fade" style={MODB(400)}>
    <div style={{textAlign:"center",marginBottom:24}}>
      <div style={{fontSize:36,marginBottom:8}}>{needPw?"🔒":"👷"}</div>
      <div style={{fontSize:18,fontWeight:700}}>{needPw?"ยืนยันตัวตนผู้อนุมัติ":"ระบุตัวตน"}</div>
      {needPw && <div style={{fontSize:13,color:C.primary,marginTop:6,fontWeight:600}}>👔 {foundUser?.name} ({foundUser?.dept})</div>}
    </div>
    {!needPw ? <>
      <div style={{marginBottom:14}}>
        <span style={lbl()}>รหัสพนักงาน</span>
        <input style={inp({fontSize:16,padding:"12px"})} placeholder="เช่น MTN, ..."
          value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryLogin()} autoFocus/>
      </div>
    </> : <>
      <div style={{marginBottom:14}}>
        <span style={lbl()}>รหัสผ่าน</span>
        <input type="password" style={inp({fontSize:16,padding:"12px"})} placeholder="ใส่รหัสผ่าน..."
          value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryLogin()} autoFocus/>
      </div>
    </>}
    {err && <div style={{color:"#dc2626",fontSize:12,marginBottom:10,background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:6,padding:"8px 12px"}}>⚠ {err}</div>}
    <div style={{background:"#f8fafc",border:"1px solid "+C.border,borderRadius:8,padding:12,marginBottom:16,fontSize:12}}>
      <div style={{fontWeight:600,marginBottom:4,color:C.sub}}>บัญชีทดสอบ</div>
      <div>👷 ผู้ปฏิบัติงาน: <code>MTN</code> / <code>รหัสพนักงาน</code></div>
      <div style={{marginTop:4}}>👔 ผู้อนุมัติ: <code>admin</code> (รหัส: <code>admin</code>)</div></div>
    <button style={btn("primary",{width:"100%",justifyContent:"center",padding:12})} onClick={tryLogin}>
      {needPw?"🔐 ยืนยันเข้าสู่ระบบ":"เข้าสู่ระบบ"}</button>
    {needPw && <button style={btn("outline",{width:"100%",justifyContent:"center",marginTop:8})} onClick={()=>{setNeedPw(false);setFoundUser(null);setP("");setErr("");}}>← กลับ</button>}
    <button style={btn("ghost",{width:"100%",justifyContent:"center",marginTop:8})} onClick={onClose}>ยกเลิก</button>
  </div></div>;
}

function StockModal({part,mode,mg,session,onWithdraw,onReceive,onClose}){
  const [qty,setQty]=useState(1);
  const [note,setNote]=useState("");
  const [empId,setEmpId]=useState("");
  const [empErr,setEmpErr]=useState("");
  const isW=mode==="withdraw";
  const needEmpId = isW && (!session || session.role.toLowerCase()==="approver");
  function handle(){
    if(needEmpId){
      const r = validateEmployeeId(empId);
      if(!r.ok){setEmpErr(r.err);return;}
      onWithdraw(part.id, qty, note, r.user);
    } else {
      if(isW) onWithdraw(part.id, qty, note, session);
      else onReceive(part.id, qty, note);
    }
  }
  return <div style={MOD}><div className="anim-fade" style={MODB(460)}>
    <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>{isW?"▼ ขอเบิก":"▲ รับเข้า"} Spare Part</div>
    {mg && <div style={{fontSize:12,color:mg.color,fontWeight:600,marginBottom:4}}>{mg.icon} {mg.name}</div>}
    <div style={{fontSize:13,color:C.sub,marginBottom:16}}>{part.name} · คงเหลือ <strong>{part.stock}</strong> {part.unit}</div>
    {isW && <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:10,marginBottom:14,fontSize:12,color:"#1e40af"}}>
      📋 คำขอเบิกจะถูกส่งให้ผู้อนุมัติก่อน</div>}
    <div style={{marginBottom:12}}><span style={lbl()}>จำนวน</span>
      <input type="number" min={1} max={isW?part.stock:99999} style={inp({width:120})} value={qty} onChange={e=>setQty(+e.target.value||1)}/></div>
    <div style={{marginBottom:14}}><span style={lbl()}>หมายเหตุ</span><input style={inp()} placeholder="ระบุงาน..." value={note} onChange={e=>setNote(e.target.value)}/></div>
    {needEmpId && <div style={{marginBottom:14,background:"#eff6ff",border:"2px solid #3b82f6",borderRadius:10,padding:14}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <span style={{fontSize:18}}>🔑</span>
        <span style={{fontSize:14,fontWeight:700,color:"#1e40af"}}>รหัสพนักงาน</span>
        <span style={{marginLeft:"auto",fontSize:10,fontWeight:700,color:"#fff",background:"#3b82f6",borderRadius:20,padding:"3px 10px"}}>⏱ จำไว้ 24 ชม.</span>
      </div>
      <input style={inp({fontSize:17,padding:"11px 14px",fontWeight:600,borderWidth:2,borderColor:"#bfdbfe"})} placeholder="เช่น MTN, ..."
        value={empId} onChange={e=>{setEmpId(e.target.value);setEmpErr("");}}
        onKeyDown={e=>{if(e.key==="Enter")handle();}}/>
      {empErr && <div style={{color:"#dc2626",fontSize:12,marginTop:8,fontWeight:600,background:"#fef2f2",padding:"6px 10px",borderRadius:6}}>⚠ {empErr}</div>}
      <div style={{fontSize:11,color:"#1e40af",marginTop:8,padding:"6px 10px",background:"#dbeafe",borderRadius:6}}>
        ✓ ใส่ครั้งเดียว → จำไว้ 24 ชม.
      </div>
    </div>}
    <div style={{display:"flex",gap:8}}>
      <button style={btn(isW?"primary":"success",{flex:1,justifyContent:"center"})}
        onClick={handle}>✓ {isW?"ส่งคำขอเบิก":"รับเข้า"} {qty} {part.unit}</button>
      <button style={btn("ghost")} onClick={onClose}>ยกเลิก</button></div>
  </div></div>;
}

function QRModal({part,mg,onClose}){

  return <div style={MOD} onClick={onClose}><div className="anim-fade" style={{...MODB(440),textAlign:"center"}} onClick={e=>e.stopPropagation()}>
    {mg && <div style={{fontSize:12,color:mg.color,fontWeight:600,marginBottom:4}}>{mg.icon} {mg.name}</div>}
    <div style={{fontWeight:700,fontSize:16,marginBottom:2}}>{part.name}</div>
    <div style={{fontSize:12,color:C.sub,marginBottom:16}}>{part.partCode} · {part.loc}</div>
    <div style={{display:"flex",justifyContent:"center",marginBottom:12}}><QR value={qrValue} size={200}/></div>
    {hasUrl
      ? <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:12,marginBottom:12,fontSize:12,color:"#166534",textAlign:"left"}}>
        <strong>✓ พร้อมสแกน!</strong> ใช้กล้องมือถือสแกน QR นี้ → เด้ง Popup เบิกทันที</div>
      : <div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,padding:12,marginBottom:12,fontSize:12,color:"#991b1b",textAlign:"left"}}>
        <strong>⚠ ยังสแกนไม่ได้</strong> เพราะเปิดจาก file:// — Host บน Vercel/Netlify ก่อน</div>}
    <div style={{fontSize:11,color:C.muted,marginBottom:12,wordBreak:"break-all",background:"#f8fafc",padding:8,borderRadius:6,
      display:"flex",alignItems:"center",gap:6}}>
      <span style={{flex:1,textAlign:"left"}}>{qrValue}</span>
      {hasUrl && <button style={btn("outline",{fontSize:10,padding:"4px 8px",whiteSpace:"nowrap"})}
        onClick={copyUrl}>{copied?"✓ Copied!":"📋 Copy"}</button>}
    </div>
    <button style={btn("primary",{width:"100%",justifyContent:"center"})} onClick={()=>window.print()}>⎙ Print QR</button>
    <button style={btn("ghost",{width:"100%",justifyContent:"center",marginTop:8})} onClick={onClose}>ปิด</button>
  </div></div>;
}

      {[["partCode","รหัส Part","BRG-6205"],["name","ชื่อ Spare Part","Bearing 6205"]].map(([k,l,ph])=>
        <div key={k}><span style={lbl()}>{l}</span><input style={inp()} placeholder={ph} value={f[k]} onChange={e=>s(k,e.target.value)}/></div>)}</div>
    <div style={{marginBottom:12}}><span style={lbl()}>คำอธิบาย</span><input style={inp()} placeholder="..." value={f.desc} onChange={e=>s("desc",e.target.value)}/></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
      <div><span style={lbl()}>หน่วย</span><input style={inp()} placeholder="ชิ้น..." value={f.unit} onChange={e=>s("unit",e.target.value)}/></div>
      <div><span style={lbl()}>หมวดหมู่</span><select style={inp()} value={f.cat} onChange={e=>s("cat",e.target.value)}>{PART_CATS.map(c=><option key={c}>{c}</option>)}</select></div></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
      {[["stock","Stock เริ่มต้น"],["min","Min"],["max","Max"]].map(([k,l])=>
        <div key={k}><span style={lbl()}>{l}</span><input type="number" style={inp()} value={f[k]} onChange={e=>s(k,e.target.value)}/></div>)}</div>
    <div style={{marginBottom:20}}><span style={lbl()}>ตำแหน่งชั้นวาง</span><input style={inp()} placeholder="A-01..." value={f.loc} onChange={e=>s("loc",e.target.value)}/></div>
    <div style={{display:"flex",gap:8}}>
      <button style={btn("primary",{flex:1,justifyContent:"center"})} onClick={()=>{if(!f.partCode||!f.name||!f.mgId)return;onAdd(f);}}>✓ บันทึก</button>
      <button style={btn("ghost")} onClick={onClose}>ยกเลิก</button></div>
  </div></div>;
}

function PrintQRSheetModal({parts,mgMap,onClose}){
  const [cols,setCols] = useState(3);
  const [showInfo,setShowInfo] = useState(true);
  const hasUrl = APP_URL && APP_URL.length > 5;
  return <div className="print-root" style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:400,overflowY:"auto",padding:16}}>
    <div className="print-page" style={{background:"#fff",borderRadius:12,maxWidth:1000,margin:"0 auto",padding:24}}>
      <div className="no-print" style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,paddingBottom:14,borderBottom:"2px solid "+C.border,flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontWeight:700,fontSize:18}}>🖨 พิมพ์ QR Code ทั้งหมด</div>
          <div style={{fontSize:12,color:C.sub,marginTop:2}}>{parts.length} รายการ · พิมพ์เป็นสติกเกอร์ติดชั้นวาง</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:C.sub}}>คอลัมน์/หน้า:</span>
          {[2,3,4].map(n=>
            <button key={n} style={btn(cols===n?"primary":"outline",{fontSize:12,padding:"6px 12px"})} onClick={()=>setCols(n)}>{n}</button>
          )}
          <label style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:12,color:C.sub,cursor:"pointer"}}>
            <input type="checkbox" checked={showInfo} onChange={e=>setShowInfo(e.target.checked)}/> แสดงรายละเอียด
          </label>
          <button style={btn("primary")} onClick={()=>window.print()}>⎙ พิมพ์</button>
          <button style={btn("ghost")} onClick={onClose}>ปิด</button>
        </div>
      </div>
      {!hasUrl && <div className="no-print" style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,padding:12,marginBottom:14,fontSize:12,color:"#991b1b"}}>
        <strong>⚠ QR อาจสแกนแล้วเปิดไม่ได้</strong> — ตอนนี้เปิดจาก <code>file://</code> ตัว QR เก็บแค่ Part Code (ข้อความ)<br/>
        ต้อง Host ไฟล์บน Vercel/Netlify แล้วเปิดจาก URL นั้น QR ถึงจะลิงก์มาที่ Popup เบิก
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat("+cols+",1fr)",gap:10}}>
        {parts.map(p=>{
          const mg = mgMap[p.mgId];
          const qrSize = cols===2?180 : cols===3?140 : 110;
          return <div key={p.id} className="qr-card" style={{border:"2px dashed "+C.border,borderRadius:8,padding:10,textAlign:"center",background:"#fff"}}>
            {showInfo && mg && <div style={{fontSize:10,fontWeight:700,color:mg.color,marginBottom:4}}>{mg.icon} {mg.name}</div>}
            <div style={{display:"flex",justifyContent:"center",marginBottom:6}}>
              <QR value={makeQRUrl(p.partCode)} size={qrSize}/>
            </div>
            <div style={{fontSize:cols===4?10:12,fontWeight:700,marginBottom:2,lineHeight:1.2}}>{p.name}</div>
            <code style={{fontSize:cols===4?9:10,color:C.sub,fontWeight:600}}>{p.partCode}</code>
            {showInfo && <div style={{fontSize:cols===4?9:10,color:C.muted,marginTop:3}}>📍 {p.loc} · {p.cat}</div>}
          </div>;
        })}
      </div>
      {parts.length===0 && <div style={{textAlign:"center",padding:40,color:C.muted}}>ไม่มี Spare Part ให้พิมพ์</div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
